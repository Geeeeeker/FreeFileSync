name: Build FreeFileSync (Single Architecture)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: true
        default: 'amd64'
        type: choice
        options:
          - amd64
          - arm64
          - arm
          - i386

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create build script
        run: |
          cat > build.sh << 'EOF'
          #!/bin/bash
          set -e
          export DEBIAN_FRONTEND=noninteractive

          if command -v sudo &> /dev/null; then
              SUDO=sudo
          else
              SUDO=
          fi

          # 修复 apt 源（针对 arm64/arm 架构使用 ports.ubuntu.com）
          if [ "$(uname -m)" != "x86_64" ]; then
              $SUDO sed -i 's|http://archive.ubuntu.com/ubuntu/|http://ports.ubuntu.com/ubuntu-ports/|g' /etc/apt/sources.list
              $SUDO sed -i 's|http://security.ubuntu.com/ubuntu|http://ports.ubuntu.com/ubuntu-ports|g' /etc/apt/sources.list
          fi

          $SUDO apt update
          $SUDO apt install -y wget unzip bzip2 make g++ pkg-config libgtk-3-dev libssl-dev libpsl-dev libidn2-dev patch git

          # 构建 libssh2
          wget -q https://libssh2.org/download/libssh2-1.11.1.tar.gz
          tar xzf libssh2-1.11.1.tar.gz
          cd libssh2-1.11.1
          mkdir build && cd build
          ../configure
          make -j$(nproc)
          $SUDO make install
          $SUDO cp /usr/local/lib/libssh2.so.1.0.1 /usr/lib/$(gcc -dumpmachine)/ 2>/dev/null || true
          $SUDO ldconfig
          cd ../..

          # 构建 libcurl
          wget -q https://curl.se/download/curl-8.15.0.tar.gz
          tar xzf curl-8.15.0.tar.gz
          cd curl-8.15.0
          mkdir build && cd build
          ../configure --with-openssl --with-libssh2 --enable-versioned-symbols
          make -j$(nproc)
          $SUDO make install
          $SUDO cp /usr/local/lib/libcurl.so.4.8.0 /usr/lib/$(gcc -dumpmachine)/ 2>/dev/null || true
          $SUDO ldconfig
          cd ../..

          # 构建 wxWidgets
          wget -q https://github.com/wxWidgets/wxWidgets/releases/download/v3.3.1/wxWidgets-3.3.1.tar.bz2
          tar xjf wxWidgets-3.3.1.tar.bz2
          cd wxWidgets-3.3.1
          mkdir gtk-build && cd gtk-build
          ../configure --disable-shared
          make -j$(nproc)
          $SUDO make install
          cd ../..

          # 清理并克隆 FreeFileSync 源码（使用 version14 分支）
          rm -rf FreeFileSync
          git clone --branch version14 https://github.com/Geeeeeker/FreeFileSync.git
          cd FreeFileSync
          REPO_ROOT=$(pwd)

          # 确定构建目录（包含 Makefile 的目录）
          if [ -f "Source/Makefile" ]; then
              BUILD_DIR="Source"
          elif [ -f "Makefile" ]; then
              BUILD_DIR="."
          else
              echo "Error: Cannot find Makefile"
              exit 1
          fi
          echo "Build directory: $BUILD_DIR"

          # 应用补丁（使用绝对路径，避免目录切换问题）
          # 4.1 sftp.cpp
          if [ -f "$REPO_ROOT/Source/afs/sftp.cpp" ]; then
              sed -i '21i#define MAX_SFTP_OUTGOING_SIZE 30000\n#define MAX_SFTP_READ_SIZE 30000' "$REPO_ROOT/Source/afs/sftp.cpp"
          elif [ -f "$REPO_ROOT/afs/sftp.cpp" ]; then
              sed -i '21i#define MAX_SFTP_OUTGOING_SIZE 30000\n#define MAX_SFTP_READ_SIZE 30000' "$REPO_ROOT/afs/sftp.cpp"
          else
              echo "Warning: afs/sftp.cpp not found, skipping"
          fi

          # 4.2 Makefile (GTK2 → GTK3)
          if [ -f "$REPO_ROOT/$BUILD_DIR/Makefile" ]; then
              sed -i 's/`pkg-config --cflags gtk+-2.0`/`pkg-config --cflags gtk+-3.0`/' "$REPO_ROOT/$BUILD_DIR/Makefile"
              sed -i 's/-isystem\/usr\/include\/gtk-2.0/-isystem\/usr\/include\/gtk-3.0/' "$REPO_ROOT/$BUILD_DIR/Makefile"
          else
              echo "Warning: Makefile not found in $BUILD_DIR, skipping GTK3 change"
          fi

          # 4.3 application.cpp
          if [ -f "$REPO_ROOT/Source/application.cpp" ]; then
              sed -i '243s/#error/#warning/' "$REPO_ROOT/Source/application.cpp"
          elif [ -f "$REPO_ROOT/application.cpp" ]; then
              sed -i '243s/#error/#warning/' "$REPO_ROOT/application.cpp"
          else
              echo "Warning: application.cpp not found, skipping"
          fi

          # 4.4 darkmode.cpp
          if [ -f "$REPO_ROOT/wx+/darkmode.cpp" ]; then
              sed -i '63s/globalDefaultThemeIsDark = wxSystemSettings::GetAppearance().AreAppsDark();/globalDefaultThemeIsDark = false;/' "$REPO_ROOT/wx+/darkmode.cpp"
              sed -i '96,99d' "$REPO_ROOT/wx+/darkmode.cpp"
          else
              echo "Warning: wx+/darkmode.cpp not found, skipping"
          fi

          # 4.5 darkmode.h
          if [ -f "$REPO_ROOT/wx+/darkmode.h" ]; then
              sed -i '12i#include <wx/settings.h>' "$REPO_ROOT/wx+/darkmode.h"
              sed -i '29r /dev/stdin' "$REPO_ROOT/wx+/darkmode.h" << 'EOL'
          struct wxColorHook
          {
              virtual ~wxColorHook() {}
              virtual wxColour getColor(wxSystemColour index) const = 0;
          };
          WXDLLIMPEXP_CORE inline std::unique_ptr<wxColorHook>& refGlobalColorHook()
          {
              static std::unique_ptr<wxColorHook> globalColorHook;
              return globalColorHook;
          }

          class WXDLLIMPEXP_CORE wxSystemSettings2 : public wxSystemSettingsNative
          {
          public:
              static wxColour GetColour(wxSystemColour index)
              {
                 if (refGlobalColorHook())
                                  return refGlobalColorHook()->getColor(index);

                 return wxSystemSettingsNative::GetColour(index);
              }
          };
          EOL
          else
              echo "Warning: wx+/darkmode.h not found, skipping"
          fi

          # 4.6 gdrive.cpp (可选，留空)
          # 如需 Google Drive 支持，请在此填入凭据

          # 进入构建目录并编译
          cd "$REPO_ROOT/$BUILD_DIR"
          make -j$(nproc)

          # 定位二进制文件（通常在 ../Build/Bin 或 Build/Bin）
          cd "$REPO_ROOT"
          if [ -d "Build/Bin" ]; then
              cd Build/Bin
          elif [ -d "../Build/Bin" ]; then
              cd ../Build/Bin
          else
              echo "Error: Build/Bin directory not found"
              exit 1
          fi

          if [ -f FreeFileSync_aarch64 ]; then
              BIN_SRC="FreeFileSync_aarch64"
          elif [ -f FreeFileSync_armhf ]; then
              BIN_SRC="FreeFileSync_armhf"
          elif [ -f FreeFileSync_i386 ]; then
              BIN_SRC="FreeFileSync_i386"
          elif [ -f FreeFileSync_amd64 ]; then
              BIN_SRC="FreeFileSync_amd64"
          else
              echo "Could not find FreeFileSync binary"
              exit 1
          fi
          cp "$BIN_SRC" /workspace/FreeFileSync_binary
          EOF
          chmod +x build.sh

      - name: Set up QEMU
        if: github.event.inputs.arch != 'amd64'
        uses: docker/setup-qemu-action@v3

      - name: Build for amd64 (native)
        if: github.event.inputs.arch == 'amd64'
        run: ./build.sh

      - name: Build for ${{ github.event.inputs.arch }} (via Docker)
        if: github.event.inputs.arch != 'amd64'
        run: |
          case "${{ github.event.inputs.arch }}" in
            arm64) PLATFORM=linux/arm64 ;;
            arm)   PLATFORM=linux/arm/v7 ;;
            i386)  PLATFORM=linux/386 ;;
          esac
          docker run --rm \
            --platform $PLATFORM \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ubuntu:24.04 \
            bash -c "./build.sh"

      - name: Prepare ZIP archive
        run: |
          mkdir -p output
          cp FreeFileSync_binary output/FreeFileSync_${{ github.event.inputs.arch }}
          cd output
          zip ../FreeFileSync_${{ github.event.inputs.arch }}.zip FreeFileSync_${{ github.event.inputs.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync_${{ github.event.inputs.arch }}
          path: FreeFileSync_${{ github.event.inputs.arch }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}-${{ github.event.inputs.arch }}
          name: FreeFileSync ${{ github.event.inputs.arch }} (build #${{ github.run_number }})
          body: |
            **Architecture**: ${{ github.event.inputs.arch }}
            **Commit**: ${{ github.sha }}
            **Run ID**: ${{ github.run_id }}
            **Build Date**: ${{ github.event.repository.updated_at }}
          draft: false
          prerelease: true
          files: FreeFileSync_${{ github.event.inputs.arch }}.zip
