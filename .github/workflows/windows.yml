name: Build FreeFileSync (Windows only)

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target platforms (only windows supported)'
        required: true
        default: 'windows'
        type: string
      architectures:
        description: 'Target architectures (only x64 supported)'
        required: true
        default: 'x64'
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: generate
        run: |
          # 仅支持 Windows x64
          declare -A SUPPORTED=(
            [windows]="x64"
          )

          IFS=',' read -r -a PLATFORMS <<< "${{ inputs.platforms }}"
          IFS=',' read -r -a ARCHS <<< "${{ inputs.architectures }}"

          MATRIX_ENTRIES=()
          for platform in "${PLATFORMS[@]}"; do
            platform=$(echo "$platform" | xargs)
            if [[ -z "${SUPPORTED[$platform]}" ]]; then
              echo "Unsupported platform: $platform (only windows is allowed)"
              exit 1
            fi
            for arch in "${ARCHS[@]}"; do
              arch=$(echo "$arch" | xargs)
              if [[ " ${SUPPORTED[$platform]} " =~ " $arch " ]]; then
                MATRIX_ENTRIES+=("{\"platform\":\"$platform\",\"arch\":\"$arch\"}")
              else
                echo "Warning: $arch is not supported on $platform, skipping"
              fi
            done
          done

          if [ ${#MATRIX_ENTRIES[@]} -eq 0 ]; then
            echo "No valid (platform, arch) pairs selected."
            exit 1
          fi

          matrix_json=$(printf '%s\n' "${MATRIX_ENTRIES[@]}" | jq -c -s '.')
          echo "matrix=$matrix_json" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: windows-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout source code (master branch)
        uses: actions/checkout@v4
        with:
          repository: Geeeeeker/FreeFileSync
          ref: master
          path: FreeFileSync

      # ---------- Windows 依赖安装 (MSYS2) ----------
      - name: Install Windows base dependencies (MSYS2)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-libssh2
            mingw-w64-x86_64-gtk3
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-autotools
            wget
            tar
            patch

      # 手动编译 wxWidgets 3.1.2（Windows）
      - name: Build and install wxWidgets 3.1.2 (Windows)
        shell: msys2 {0}
        run: |
          cd $HOME
          wget https://github.com/wxWidgets/wxWidgets/releases/download/v3.1.2/wxWidgets-3.1.2.tar.bz2
          tar xf wxWidgets-3.1.2.tar.bz2
          cd wxWidgets-3.1.2
          mkdir -p build-msw
          cd build-msw
          ../configure --disable-shared --enable-unicode --prefix=/mingw64 \
            --with-msw --with-libpng=builtin --with-libjpeg=builtin --with-libtiff=builtin \
            --with-expat=builtin --with-zlib=builtin --disable-dependency-tracking
          make -j$(nproc)
          make install

      # ---------- 修复头文件路径（智能查找 zen 目录）----------
      - name: Prepare include path (Windows)
        shell: msys2 {0}
        working-directory: FreeFileSync/FreeFileSync/Source
        run: |
          echo "=== Locating zen directory ==="
          ZEN_PATH=""
          DIR=$(pwd)
          while [ "$DIR" != "/" ]; do
            if [ -d "$DIR/zen" ]; then
              ZEN_PATH="$DIR/zen"
              break
            fi
            DIR=$(dirname "$DIR")
          done
          if [ -z "$ZEN_PATH" ]; then
            echo "ERROR: zen directory not found!"
            exit 1
          fi
          echo "zen directory found at: $ZEN_PATH"

          # 1. 将 -I 写入 Makefile（兼容原有逻辑）
          if grep -q '^CXXFLAGS[[:space:]]*+=' Makefile; then
            sed -i "s|^\(CXXFLAGS[[:space:]]*+=\)|\1 -I$ZEN_PATH|" Makefile
          else
            echo "CXXFLAGS += -I$ZEN_PATH" >> Makefile
          fi

          # 2. 设置环境变量，确保编译器总能找到（即使 Makefile 覆盖）
          echo "CXXFLAGS=\"-I$ZEN_PATH \$CXXFLAGS\"" >> $GITHUB_ENV
          echo "CPPFLAGS=\"-I$ZEN_PATH \$CPPFLAGS\"" >> $GITHUB_ENV

          # 3. 在临时构建目录创建符号链接（避免构建过程切换目录后找不到）
          #   根据错误信息，临时目录为 /tmp/FreeFileSync_x86_64_Make/ffs/src/
          TMP_BUILD_DIR="/tmp/FreeFileSync_x86_64_Make/ffs/src"
          mkdir -p "$TMP_BUILD_DIR"
          ln -sf "$ZEN_PATH" "$TMP_BUILD_DIR/zen"
          echo "Created symlink in $TMP_BUILD_DIR/zen"

      # ---------- Windows 构建 (x64) ----------
      - name: Build FreeFileSync for Windows (x64)
        shell: msys2 {0}
        working-directory: FreeFileSync/FreeFileSync/Source
        env:
          MSYSTEM: MINGW64
          # 强制 pkg-config 只使用 Mingw64 的库路径，避免错误引用 /usr/include
          PKG_CONFIG_LIBDIR: /mingw64/lib/pkgconfig
        run: |
          export PATH=/mingw64/bin:$PATH
          # 确保编译器为 g++（Makefile 中可能写死 g++，无需修改）
          # 可选：检查 pkg-config 是否正确
          echo "Checking gtk+-3.0 cflags:"
          pkg-config --cflags gtk+-3.0

          # 执行构建
          make -j$(nproc)

          # 复制产物
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync.exe $GITHUB_WORKSPACE/artifacts/FreeFileSync_windows_x64.exe

      # ---------- 上传构建产物 ----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/
