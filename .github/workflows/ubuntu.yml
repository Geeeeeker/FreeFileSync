name: Build FreeFileSync

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target platforms (comma separated: linux)'
        required: true
        default: 'linux'
        type: string
      architectures:
        description: 'Target architectures (comma separated: x64, x86, arm, arm64)'
        required: true
        default: 'x64,x86,arm,arm64'
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: generate
        run: |
          # 定义支持的平台与架构（仅 linux，包含四种架构）
          declare -A SUPPORTED=(
            [linux]="x64 x86 arm arm64"
          )

          IFS=',' read -r -a PLATFORMS <<< "${{ inputs.platforms }}"
          IFS=',' read -r -a ARCHS <<< "${{ inputs.architectures }}"

          MATRIX_ENTRIES=()
          for platform in "${PLATFORMS[@]}"; do
            platform=$(echo "$platform" | xargs)
            if [[ -z "${SUPPORTED[$platform]}" ]]; then
              echo "Unsupported platform: $platform"
              exit 1
            fi
            for arch in "${ARCHS[@]}"; do
              arch=$(echo "$arch" | xargs)
              if [[ " ${SUPPORTED[$platform]} " =~ " $arch " ]]; then
                MATRIX_ENTRIES+=("{\"platform\":\"$platform\",\"arch\":\"$arch\"}")
              else
                echo "Warning: $arch is not supported on $platform, skipping"
              fi
            done
          done

          if [ ${#MATRIX_ENTRIES[@]} -eq 0 ]; then
            echo "No valid (platform, arch) pairs selected."
            exit 1
          fi

          matrix_json=$(printf '%s\n' "${MATRIX_ENTRIES[@]}" | jq -c -s '.')
          echo "matrix=$matrix_json" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout source code (master branch)
        uses: actions/checkout@v4
        with:
          repository: Geeeeeker/FreeFileSync
          ref: master
          path: FreeFileSync

      # ---------- 基础依赖安装（所有架构通用） ----------
      - name: Install base build tools
        run: |
          sudo apt update
          sudo apt install -y \
            g++ make \
            pkg-config \
            autoconf automake libtool \
            gettext \
            wget

      # ---------- 根据架构安装交叉编译工具链与库 ----------
      - name: Install dependencies for x64
        if: matrix.arch == 'x64'
        run: |
          sudo apt install -y \
            libboost-all-dev \
            libcurl4-openssl-dev \
            libssh2-1-dev \
            libidn2-dev \
            libgtk-3-dev \
            libssl-dev

      - name: Install dependencies for x86
        if: matrix.arch == 'x86'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y \
            g++-multilib \
            libboost-all-dev:i386 \
            libcurl4-openssl-dev:i386 \
            libssh2-1-dev:i386 \
            libidn2-dev:i386 \
            libgtk-3-dev:i386 \
            libssl-dev:i386

      - name: Install dependencies for armhf
        if: matrix.arch == 'arm'
        run: |
          sudo dpkg --add-architecture armhf
          # 添加 armhf 的 ports 源
          sudo sh -c 'echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy main universe" > /etc/apt/sources.list.d/armhf.list'
          sudo apt update
          sudo apt install -y \
            g++-arm-linux-gnueabihf \
            libboost-all-dev:armhf \
            libcurl4-openssl-dev:armhf \
            libssh2-1-dev:armhf \
            libidn2-dev:armhf \
            libgtk-3-dev:armhf \
            libssl-dev:armhf

      - name: Install dependencies for arm64
        if: matrix.arch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          # 添加 arm64 的 ports 源
          sudo sh -c 'echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main universe" > /etc/apt/sources.list.d/arm64.list'
          sudo apt update
          sudo apt install -y \
            g++-aarch64-linux-gnu \
            libboost-all-dev:arm64 \
            libcurl4-openssl-dev:arm64 \
            libssh2-1-dev:arm64 \
            libidn2-dev:arm64 \
            libgtk-3-dev:arm64 \
            libssl-dev:arm64

      # ---------- 构建并安装 wxWidgets 3.1.2（针对当前架构，使用独立前缀避免冲突） ----------
      - name: Build and install wxWidgets 3.1.2 (x64)
        if: matrix.arch == 'x64'
        run: |
          wget https://github.com/wxWidgets/wxWidgets/releases/download/v3.1.2/wxWidgets-3.1.2.tar.bz2
          tar xf wxWidgets-3.1.2.tar.bz2
          cd wxWidgets-3.1.2
          mkdir gtk-build && cd gtk-build
          ../configure --disable-shared --enable-unicode --prefix=/usr/local \
            --with-gtk=3
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Build and install wxWidgets 3.1.2 (x86)
        if: matrix.arch == 'x86'
        env:
          HOST_TRIPLE: i686-linux-gnu
        run: |
          wget https://github.com/wxWidgets/wxWidgets/releases/download/v3.1.2/wxWidgets-3.1.2.tar.bz2
          tar xf wxWidgets-3.1.2.tar.bz2
          cd wxWidgets-3.1.2
          mkdir gtk-build && cd gtk-build
          ../configure --disable-shared --enable-unicode --prefix=/usr/local/$HOST_TRIPLE \
            --host=$HOST_TRIPLE --build=x86_64-linux-gnu --with-gtk=3 \
            CFLAGS="-m32" CXXFLAGS="-m32" LDFLAGS="-m32"
          make -j$(nproc)
          sudo make install

      - name: Build and install wxWidgets 3.1.2 (armhf)
        if: matrix.arch == 'arm'
        env:
          HOST_TRIPLE: arm-linux-gnueabihf
        run: |
          wget https://github.com/wxWidgets/wxWidgets/releases/download/v3.1.2/wxWidgets-3.1.2.tar.bz2
          tar xf wxWidgets-3.1.2.tar.bz2
          cd wxWidgets-3.1.2
          mkdir gtk-build && cd gtk-build
          ../configure --disable-shared --enable-unicode --prefix=/usr/local/$HOST_TRIPLE \
            --host=$HOST_TRIPLE --build=x86_64-linux-gnu --with-gtk=3
          make -j$(nproc)
          sudo make install

      - name: Build and install wxWidgets 3.1.2 (arm64)
        if: matrix.arch == 'arm64'
        env:
          HOST_TRIPLE: aarch64-linux-gnu
        run: |
          wget https://github.com/wxWidgets/wxWidgets/releases/download/v3.1.2/wxWidgets-3.1.2.tar.bz2
          tar xf wxWidgets-3.1.2.tar.bz2
          cd wxWidgets-3.1.2
          mkdir gtk-build && cd gtk-build
          ../configure --disable-shared --enable-unicode --prefix=/usr/local/$HOST_TRIPLE \
            --host=$HOST_TRIPLE --build=x86_64-linux-gnu --with-gtk=3
          make -j$(nproc)
          sudo make install

      # ---------- 修复头文件路径（确保 zen/warn_static.h 可被找到） ----------
      - name: Prepare include path
        working-directory: FreeFileSync/FreeFileSync/Source
        run: |
          echo "=== Finding zen directory ==="
          ZEN_PATH=$(find $GITHUB_WORKSPACE/FreeFileSync -type d -name zen | head -1)
          if [ -n "$ZEN_PATH" ]; then
            echo "zen directory found at: $ZEN_PATH"
            sed -i "s|^\(CXXFLAGS[[:space:]]*+=\)|\1 -I$ZEN_PATH|" Makefile
            ln -sf "$ZEN_PATH" zen
          else
            echo "ERROR: zen directory not found"
            exit 1
          fi

      # ---------- 构建 FreeFileSync（根据架构） ----------
      - name: Build FreeFileSync for x64
        if: matrix.arch == 'x64'
        working-directory: FreeFileSync/FreeFileSync/Source
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig
        run: |
          make -j$(nproc) CXX=g++
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync $GITHUB_WORKSPACE/artifacts/FreeFileSync_linux_x64

      - name: Build FreeFileSync for x86
        if: matrix.arch == 'x86'
        working-directory: FreeFileSync/FreeFileSync/Source
        env:
          HOST_TRIPLE: i686-linux-gnu
          CXX: g++
          CXXFLAGS: -m32
          LDFLAGS: -m32
          PKG_CONFIG_PATH: /usr/local/$HOST_TRIPLE/lib/pkgconfig:/usr/lib/i386-linux-gnu/pkgconfig
        run: |
          export PATH=/usr/local/$HOST_TRIPLE/bin:$PATH
          make -j$(nproc) CXX=g++ CXXFLAGS="$CXXFLAGS" LDFLAGS="$LDFLAGS"
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync $GITHUB_WORKSPACE/artifacts/FreeFileSync_linux_x86

      - name: Build FreeFileSync for armhf
        if: matrix.arch == 'arm'
        working-directory: FreeFileSync/FreeFileSync/Source
        env:
          HOST_TRIPLE: arm-linux-gnueabihf
          CXX: arm-linux-gnueabihf-g++
          PKG_CONFIG_PATH: /usr/local/$HOST_TRIPLE/lib/pkgconfig:/usr/lib/$HOST_TRIPLE/pkgconfig
        run: |
          export PATH=/usr/local/$HOST_TRIPLE/bin:$PATH
          make -j$(nproc) CXX=$CXX
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync $GITHUB_WORKSPACE/artifacts/FreeFileSync_linux_armhf

      - name: Build FreeFileSync for arm64
        if: matrix.arch == 'arm64'
        working-directory: FreeFileSync/FreeFileSync/Source
        env:
          HOST_TRIPLE: aarch64-linux-gnu
          CXX: aarch64-linux-gnu-g++
          PKG_CONFIG_PATH: /usr/local/$HOST_TRIPLE/lib/pkgconfig:/usr/lib/$HOST_TRIPLE/pkgconfig
        run: |
          export PATH=/usr/local/$HOST_TRIPLE/bin:$PATH
          make -j$(nproc) CXX=$CXX
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync $GITHUB_WORKSPACE/artifacts/FreeFileSync_linux_arm64

      # ---------- 上传构建产物 ----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-linux-${{ matrix.arch }}
          path: artifacts/
