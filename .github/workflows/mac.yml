name: Build FreeFileSync (macOS)

on:
  workflow_dispatch:
    inputs:
      architectures:
        description: 'Target architectures (comma separated: x86_64, arm64)'
        required: true
        default: 'x86_64,arm64'
        type: string

jobs:
  setup:
    runs-on: macos-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: generate
        run: |
          SUPPORTED="x86_64 arm64"
          IFS=',' read -r -a ARCHS <<< "${{ inputs.architectures }}"
          MATRIX_ENTRIES=()
          for arch in "${ARCHS[@]}"; do
            arch=$(echo "$arch" | xargs)
            if [[ " $SUPPORTED " =~ " $arch " ]]; then
              MATRIX_ENTRIES+=("{\"arch\":\"$arch\"}")
            else
              echo "Warning: $arch is not supported, skipping"
            fi
          done
          if [ ${#MATRIX_ENTRIES[@]} -eq 0 ]; then
            echo "No valid architectures selected."
            exit 1
          fi
          matrix_json=$(printf '%s\n' "${MATRIX_ENTRIES[@]}" | jq -c -s '.')
          echo "matrix=$matrix_json" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: macos-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout source code (master branch)
        uses: actions/checkout@v4
        with:
          repository: Geeeeeker/FreeFileSync
          ref: master
          path: FreeFileSync

      - name: Install dependencies via Homebrew
        run: |
          brew update
          brew install boost wxwidgets libssh2 pkg-config

      - name: Find zen directory
        id: find-zen
        working-directory: FreeFileSync/FreeFileSync/Source
        run: |
          echo "=== Locating zen directory ==="
          ZEN_PATH=""
          DIR=$(pwd)
          while [ "$DIR" != "/" ]; do
            if [ -d "$DIR/zen" ]; then
              ZEN_PATH="$DIR/zen"
              break
            fi
            DIR=$(dirname "$DIR")
          done
          if [ -z "$ZEN_PATH" ]; then
            echo "ERROR: zen directory not found!"
            exit 1
          fi
          echo "zen directory found at: $ZEN_PATH"
          echo "zen_path=$ZEN_PATH" >> $GITHUB_OUTPUT

      - name: Apply atomic header patch
        run: |
          ZEN_PATH="${{ steps.find-zen.outputs.zen_path }}"
          echo "Patching $ZEN_PATH/string_base.h"
          if [ -f "$ZEN_PATH/string_base.h" ]; then
            if ! grep -q '#include <atomic>' "$ZEN_PATH/string_base.h"; then
              echo '#include <atomic>' | cat - "$ZEN_PATH/string_base.h" > temp && mv temp "$ZEN_PATH/string_base.h"
              echo "Patch applied."
            else
              echo "File already contains #include <atomic>"
            fi
          else
            echo "string_base.h NOT found at $ZEN_PATH!"
            exit 1
          fi

      - name: Verify atomic header patch
        run: |
          ZEN_PATH="${{ steps.find-zen.outputs.zen_path }}"
          echo "=== First 5 lines of $ZEN_PATH/string_base.h ==="
          head -5 "$ZEN_PATH/string_base.h"
          if grep -q '#include <atomic>' "$ZEN_PATH/string_base.h"; then
            echo "✅ atomic header included"
          else
            echo "❌ atomic header NOT included"
            echo '#include <atomic>' | cat - "$ZEN_PATH/string_base.h" > temp && mv temp "$ZEN_PATH/string_base.h"
            echo "Retry: inserted again"
            head -5 "$ZEN_PATH/string_base.h"
          fi

      - name: Add zen include path and symlink
        working-directory: FreeFileSync/FreeFileSync/Source
        run: |
          ZEN_PATH="${{ steps.find-zen.outputs.zen_path }}"
          if grep -q '^CXXFLAGS[[:space:]]*+=' Makefile; then
            sed -i '' "s|^\(CXXFLAGS[[:space:]]*+=\)|\1 -I$ZEN_PATH|" Makefile
          else
            echo "CXXFLAGS += -I$ZEN_PATH" >> Makefile
          fi
          ln -sf "$ZEN_PATH" zen

      - name: Debug environment
        working-directory: FreeFileSync/FreeFileSync/Source
        run: |
          echo "=== Compiler info ==="
          clang++ --version
          echo "=== Makefile content ==="
          cat Makefile
          echo "=== Homebrew prefix ==="
          brew --prefix
          echo "=== wxWidgets flags ==="
          wx-config --cxxflags --libs || echo "wx-config not found"
          echo "=== pkg-config libssh2 ==="
          pkg-config --cflags --libs libssh2 || echo "libssh2 pc not found"
          echo "=== Current directory ==="
          pwd
          ls -la

      - name: Build FreeFileSync for ${{ matrix.arch }}
        working-directory: FreeFileSync/FreeFileSync
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          if [ "$ARCH" = "x86_64" ]; then
            ARCH_FLAGS="-arch x86_64"
            HOMEBREW_PREFIX="/usr/local"
          elif [ "$ARCH" = "arm64" ]; then
            ARCH_FLAGS="-arch arm64"
            HOMEBREW_PREFIX="/opt/homebrew"
          else
            echo "Unsupported architecture: $ARCH"
            exit 1
          fi

          export CXX=clang++
          export CXXFLAGS="$ARCH_FLAGS -std=c++17 -stdlib=libc++ -I$HOMEBREW_PREFIX/include"
          export LDFLAGS="$ARCH_FLAGS -L$HOMEBREW_PREFIX/lib"
          export MACOSX_DEPLOYMENT_TARGET=11.0

          # 创建构建目录并复制整个源码树
          BUILD_DIR="$GITHUB_WORKSPACE/build_$ARCH"
          echo "Creating build directory: $BUILD_DIR"
          mkdir -p "$BUILD_DIR"
          echo "Copying source files to build directory..."
          cp -r . "$BUILD_DIR"
          cd "$BUILD_DIR/Source"

          # 再次确保补丁存在
          if [ -f zen/string_base.h ]; then
            if ! grep -q '#include <atomic>' zen/string_base.h; then
              echo '#include <atomic>' | cat - zen/string_base.h > temp && mv temp zen/string_base.h
              echo "Reapplied atomic patch in build directory."
            else
              echo "atomic header already patched in build directory."
            fi
          else
            echo "ERROR: zen/string_base.h not found in build directory!"
            exit 1
          fi

          # 将 Makefile 中的 g++ 替换为 clang++
          sed -i '' 's/\bg++\b/clang++/g' Makefile

          # 输出完整 Makefile 以便调试
          echo "=== Full Makefile before patching ==="
          cat Makefile

          # 彻底替换所有硬编码的临时目录路径
          echo "=== Patching Makefile to remove /var/folders paths ==="
          cp Makefile Makefile.bak

          # 替换所有包含 /var/folders/ 的路径为 ./obj
          sed -i '' 's|/var/folders/[^ ]*/FreeFileSync_[^ ]*_Make|./obj|g' Makefile

          # 替换可能使用的 TMPDIR 变量引用
          sed -i '' 's|\$$(TMPDIR)/FreeFileSync|./obj/FreeFileSync|g' Makefile
          sed -i '' 's|\$${TMPDIR}/FreeFileSync|./obj/FreeFileSync|g' Makefile

          # 如果存在定义 TMPDIR 或 BUILD_DIR 的行，强制覆盖为 ./obj
          sed -i '' '/^[[:space:]]*TMPDIR[[:space:]]*[:?]?=/ s|=.*| = ./obj|' Makefile
          sed -i '' '/^[[:space:]]*BUILD_DIR[[:space:]]*[:?]?=/ s|=.*| = ./obj|' Makefile
          sed -i '' '/^[[:space:]]*OBJDIR[[:space:]]*[:?]?=/ s|=.*| = ./obj|' Makefile
          sed -i '' '/^[[:space:]]*OUTDIR[[:space:]]*[:?]?=/ s|=.*| = ./obj|' Makefile

          # 额外处理：如果规则中直接使用 mkdir -p 硬编码路径，我们可能无法完全替换，但上述 sed 已覆盖常见模式

          echo "=== Makefile after patching (first 20 lines) ==="
          head -20 Makefile

          # 创建输出目录
          mkdir -p obj

          # 构建，传递所有可能的输出变量
          echo "=== Starting build ==="
          make V=1 -j$(sysctl -n hw.logicalcpu) \
              OBJDIR=./obj \
              OUTDIR=./obj \
              BUILDDIR=./obj \
              TMPDIR=./obj \
              WORKDIR=./obj \
              BUILD_DIR=./obj \
              OUTPUT_DIR=./obj 2>&1 | tee build.log

          # 复制结果
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          if [ -f ../Build/Bin/FreeFileSync ]; then
            cp ../Build/Bin/FreeFileSync $GITHUB_WORKSPACE/artifacts/FreeFileSync_macos_${{ matrix.arch }}
            echo "Binary copied."
          else
            echo "Binary not found!"
            find .. -name "FreeFileSync" -type f 2>/dev/null || true
          fi

          cp build.log $GITHUB_WORKSPACE/artifacts/build_${{ matrix.arch }}.log

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-macos-${{ matrix.arch }}-logs
          path: artifacts/
          if-no-files-found: warn
