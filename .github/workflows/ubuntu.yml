name: Build FreeFileSync and Release

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target platforms (comma separated: linux, windows)'
        required: true
        default: 'linux,windows'
        type: string
      architectures:
        description: 'Target architectures (comma separated: x64)'
        required: true
        default: 'x64'
        type: string
      release_tag:
        description: 'Release tag (e.g., v14.4.0). Leave empty to auto-generate.'
        required: false
        type: string
      release_name:
        description: 'Release name (e.g., "FreeFileSync 14.4.0"). Leave empty to use tag.'
        required: false
        type: string

# 需要写入权限以创建 Release
permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: generate
        run: |
          declare -A SUPPORTED=(
            [linux]="x64"
            [windows]="x64"
          )
          IFS=',' read -r -a PLATFORMS <<< "${{ inputs.platforms }}"
          IFS=',' read -r -a ARCHS <<< "${{ inputs.architectures }}"
          MATRIX_ENTRIES=()
          for platform in "${PLATFORMS[@]}"; do
            platform=$(echo "$platform" | xargs)
            [[ -z "${SUPPORTED[$platform]}" ]] && { echo "Unsupported platform: $platform"; exit 1; }
            for arch in "${ARCHS[@]}"; do
              arch=$(echo "$arch" | xargs)
              if [[ " ${SUPPORTED[$platform]} " =~ " $arch " ]]; then
                MATRIX_ENTRIES+=("{\"platform\":\"$platform\",\"arch\":\"$arch\"}")
              else
                echo "Warning: $arch is not supported on $platform, skipping"
              fi
            done
          done
          [ ${#MATRIX_ENTRIES[@]} -eq 0 ] && { echo "No valid pairs selected."; exit 1; }
          matrix_json=$(printf '%s\n' "${MATRIX_ENTRIES[@]}" | jq -c -s '.')
          echo "matrix=$matrix_json" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ${{ matrix.platform == 'windows' && 'windows-latest' || 'ubuntu-22.04' }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout source code (master branch)
        uses: actions/checkout@v4
        with:
          repository: Geeeeeker/FreeFileSync
          ref: master
          path: FreeFileSync

      # ---------- Linux 依赖安装 ----------
      - name: Install Linux base dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt update
          sudo apt install -y \
            g++ make \
            libboost-all-dev \
            libcurl4-openssl-dev \
            libssh2-1-dev \
            libidn2-dev \
            libgtk-3-dev \
            pkg-config \
            autoconf automake libtool \
            gettext \
            wget \
            git

      # 编译 wxWidgets 3.2.6（去掉 --enable-dpi-independent）
      - name: Build and install wxWidgets 3.2.6 (Linux)
        if: matrix.platform == 'linux'
        run: |
          wget https://github.com/wxWidgets/wxWidgets/releases/download/v3.2.6/wxWidgets-3.2.6.tar.bz2
          tar xf wxWidgets-3.2.6.tar.bz2
          cd wxWidgets-3.2.6
          mkdir gtk-build && cd gtk-build
          ../configure --disable-shared --enable-unicode --with-gtk=3 --prefix=/usr/local
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      # ---------- Windows 依赖安装 (MSYS2) ----------
      - name: Install Windows base dependencies (MSYS2)
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-libssh2
            mingw-w64-x86_64-gtk3
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-autotools
            wget
            tar
            patch
            git

      # 编译 wxWidgets 3.2.6 (Windows, MSYS2)
      - name: Build and install wxWidgets 3.2.6 (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          cd $HOME
          wget https://github.com/wxWidgets/wxWidgets/releases/download/v3.2.6/wxWidgets-3.2.6.tar.bz2
          tar xf wxWidgets-3.2.6.tar.bz2
          cd wxWidgets-3.2.6
          mkdir -p build-msw
          cd build-msw
          ../configure --disable-shared --enable-unicode --with-msw --prefix=/mingw64
          make -j$(nproc)
          make install

      # ---------- 修复头文件路径并添加缺失的 warn_static.h ----------
      - name: Prepare include path and add missing headers (Linux)
        if: matrix.platform == 'linux'
        working-directory: FreeFileSync/FreeFileSync/Source
        run: |
          # 1. 创建指向各个组件目录的符号链接
          for d in zen zenXml xBRZ 'wx+' libssh2 libcurl; do
            target="../../$d"
            if [ -e "$target" ]; then
              ln -sf "$target" "$d"
            else
              echo "Warning: $target not found"
            fi
          done

          # 2. 从 version13 分支获取 warn_static.h
          cd ../..
          git fetch origin version13:version13
          git show version13:zen/warn_static.h > zen/warn_static.h 2>/dev/null || echo "warn_static.h already exists or fetch failed"
          # 返回到正确的 Source 目录
          cd FreeFileSync/Source

          # 3. 修正 Makefile 中错误的 -I 路径（将 -I.../zen 替换为 -I.../ 即父目录）
          ZEN_PATH=$(cd ../.. && pwd)/zen
          ZEN_PARENT=$(dirname "$ZEN_PATH")
          sed -i "s#-I$ZEN_PATH#-I$ZEN_PARENT#g" Makefile

      - name: Prepare include path and add missing headers (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        working-directory: FreeFileSync/FreeFileSync/Source
        run: |
          # 1. 创建符号链接
          for d in zen zenXml xBRZ 'wx+' libssh2 libcurl; do
            target="../../$d"
            if [ -e "$target" ]; then
              ln -sf "$target" "$d"
            else
              echo "Warning: $target not found"
            fi
          done

          # 2. 获取 warn_static.h
          cd ../..
          git fetch origin version13:version13
          git show version13:zen/warn_static.h > zen/warn_static.h 2>/dev/null || echo "warn_static.h already exists or fetch failed"
          # 返回到正确的 Source 目录
          cd FreeFileSync/Source

          # 3. 修正 Makefile 中的 -I 路径
          ZEN_PATH="$(cd ../.. && pwd)/zen"
          ZEN_PARENT=$(dirname "$ZEN_PATH")
          sed -i "s#-I$ZEN_PATH#-I$ZEN_PARENT#g" Makefile

      # ---------- Linux 构建 (x64) ----------
      - name: Build FreeFileSync for Linux (x64)
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        working-directory: FreeFileSync/FreeFileSync/Source
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig
        run: |
          export PATH=/usr/local/bin:$PATH
          # 将 C++ 标准从 23 降为 17
          sed -i 's/-std=c++23/-std=c++17/g' Makefile
          make -j$(nproc)
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync $GITHUB_WORKSPACE/artifacts/FreeFileSync_linux_x64

      # ---------- Windows 构建 (x64) ----------
      - name: Build FreeFileSync for Windows (x64)
        if: matrix.platform == 'windows' && matrix.arch == 'x64'
        shell: msys2 {0}
        working-directory: FreeFileSync/FreeFileSync/Source
        env:
          MSYSTEM: MINGW64
          PKG_CONFIG_PATH: /mingw64/lib/pkgconfig
        run: |
          export PATH=/mingw64/bin:$PATH
          # 将 C++ 标准从 23 降为 17
          sed -i 's/-std=c++23/-std=c++17/g' Makefile
          make -j$(nproc)
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync.exe $GITHUB_WORKSPACE/artifacts/FreeFileSync_windows_x64.exe

      # ---------- 上传构建产物 ----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/

  # 新增：收集所有构建产物，打包成一个压缩包
  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Prepare release directory structure
        run: |
          mkdir -p release/FreeFileSync
          # 遍历下载的每个 Artifact 文件夹，将文件复制到以平台架构命名的子目录中
          for artifact_dir in downloaded-artifacts/FreeFileSync-*; do
            if [ -d "$artifact_dir" ]; then
              # 提取平台架构部分，例如 FreeFileSync-linux-x64 -> linux-x64
              name=$(basename "$artifact_dir")
              suffix=${name#FreeFileSync-}   # 得到 linux-x64 或 windows-x64
              target_dir="release/FreeFileSync/$suffix"
              mkdir -p "$target_dir"
              cp -v "$artifact_dir"/* "$target_dir/"
            fi
          done

      - name: Create archive
        run: |
          cd release
          # 确定版本标签
          if [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            # 生成基于时间的标签，例如 v20250316-123456
            TAG="v$(date +'%Y%m%d-%H%M%S')"
          fi
          ARCHIVE_NAME="FreeFileSync-${TAG}.zip"
          zip -r "../${ARCHIVE_NAME}" FreeFileSync/
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Upload archive as artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-bundled
          path: ${{ env.ARCHIVE_NAME }}

    outputs:
      tag: ${{ env.TAG }}
      archive_name: ${{ env.ARCHIVE_NAME }}

  # 新增：创建 GitHub Release 并上传压缩包
  release:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download archive
        uses: actions/download-artifact@v4
        with:
          name: FreeFileSync-bundled
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.package.outputs.tag }}
          name: ${{ inputs.release_name || needs.package.outputs.tag }}
          body: |
            Automated build of FreeFileSync for platforms: ${{ inputs.platforms }}
            Architectures: ${{ inputs.architectures }}
          files: ${{ needs.package.outputs.archive_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
