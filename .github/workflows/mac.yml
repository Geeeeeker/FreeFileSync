- name: Build FreeFileSync for ${{ matrix.arch }}
  working-directory: FreeFileSync/FreeFileSync
  env:
    ARCH: ${{ matrix.arch }}
  run: |
    if [ "$ARCH" = "x86_64" ]; then
      ARCH_FLAGS="-arch x86_64"
      HOMEBREW_PREFIX="/usr/local"
    elif [ "$ARCH" = "arm64" ]; then
      ARCH_FLAGS="-arch arm64"
      HOMEBREW_PREFIX="/opt/homebrew"
    else
      echo "Unsupported architecture: $ARCH"
      exit 1
    fi

    export CXX=clang++
    export CXXFLAGS="$ARCH_FLAGS -std=c++17 -stdlib=libc++ -I$HOMEBREW_PREFIX/include"
    export LDFLAGS="$ARCH_FLAGS -L$HOMEBREW_PREFIX/lib"
    export MACOSX_DEPLOYMENT_TARGET=11.0

    # 创建构建目录并复制整个源码树
    BUILD_DIR="$GITHUB_WORKSPACE/build_$ARCH"
    echo "Creating build directory: $BUILD_DIR"
    mkdir -p "$BUILD_DIR"
    echo "Copying source files to build directory..."
    cp -r . "$BUILD_DIR"
    cd "$BUILD_DIR/Source"

    # 再次确保补丁存在
    if [ -f zen/string_base.h ]; then
      if ! grep -q '#include <atomic>' zen/string_base.h; then
        echo '#include <atomic>' | cat - zen/string_base.h > temp && mv temp zen/string_base.h
        echo "Reapplied atomic patch in build directory."
      else
        echo "atomic header already patched in build directory."
      fi
    else
      echo "ERROR: zen/string_base.h not found in build directory!"
      exit 1
    fi

    # 将 Makefile 中的 g++ 替换为 clang++
    sed -i '' 's/\bg++\b/clang++/g' Makefile

    # 查找并替换 Makefile 中所有指向临时目录的路径
    echo "=== Patching Makefile to remove /var/folders paths ==="
    # 备份原 Makefile
    cp Makefile Makefile.bak
    # 替换所有形如 /var/folders/.../FreeFileSync_${ARCH}_Make 的路径为 ./obj
    sed -i '' 's|/var/folders/[^ ]*/FreeFileSync_[^ ]*_Make|./obj|g' Makefile
    # 如果还有硬编码的 TMPDIR 使用，也替换为当前目录
    sed -i '' 's|\$$(TMPDIR)/FreeFileSync|./obj/FreeFileSync|g' Makefile
    sed -i '' 's|\$${TMPDIR}/FreeFileSync|./obj/FreeFileSync|g' Makefile
    # 如果有使用 mktemp 命令，将其替换为固定目录（较复杂，先观察）
    echo "=== Makefile after patching (first 20 lines) ==="
    head -20 Makefile

    # 创建输出目录
    mkdir -p obj

    # 尝试构建，并传递所有可能的输出目录变量
    echo "=== Starting build ==="
    make V=1 -j$(sysctl -n hw.logicalcpu) \
        OBJDIR=./obj \
        OUTDIR=./obj \
        BUILDDIR=./obj \
        TMPDIR=./obj \
        WORKDIR=./obj \
        BUILD_DIR=./obj \
        OUTPUT_DIR=./obj 2>&1 | tee build.log

    # 复制结果
    mkdir -p $GITHUB_WORKSPACE/artifacts/
    if [ -f ../Build/Bin/FreeFileSync ]; then
      cp ../Build/Bin/FreeFileSync $GITHUB_WORKSPACE/artifacts/FreeFileSync_macos_${{ matrix.arch }}
      echo "Binary copied."
    else
      echo "Binary not found!"
      # 列出可能的输出位置以便调试
      find .. -name "FreeFileSync" -type f 2>/dev/null || true
    fi

    cp build.log $GITHUB_WORKSPACE/artifacts/build_${{ matrix.arch }}.log
