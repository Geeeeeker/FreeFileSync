name: Build FreeFileSync (Multi-Platform)

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target platforms (comma separated: linux, windows, macos)'
        required: true
        default: 'linux,windows,macos'
        type: string
      architectures:
        description: 'Target architectures (comma separated: x64, x86, arm, arm64)'
        required: true
        default: 'x64'
        type: string

env:
  FFS_VERSION: 14.8
  WX_VERSION: 3.1.2
  SOURCE_REPO: Geeeeeker/FreeFileSync   # 您的源码仓库

jobs:
  # 生成构建矩阵（平台+架构的有效组合）
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: generate
        run: |
          # 定义每个平台支持的有效架构
          declare -A SUPPORTED=(
            [linux]="x64 x86 arm arm64"
            [windows]="x64 x86"           # Windows arm64 暂不支持
            [macos]="x64 arm64"
          )
          # 定义每个架构在对应平台下使用的 runner
          declare -A RUNNER_MAP
          RUNNER_MAP["linux,x64"]="ubuntu-22.04"
          RUNNER_MAP["linux,x86"]="ubuntu-22.04"      # 需要 multilib 或 chroot，此处使用 x86_64 交叉编译
          RUNNER_MAP["linux,arm"]="ubuntu-22.04-arm"   # 原生 armv7 runner
          RUNNER_MAP["linux,arm64"]="ubuntu-22.04-arm" # 原生 arm64 runner
          RUNNER_MAP["windows,x64"]="windows-latest"
          RUNNER_MAP["windows,x86"]="windows-latest"
          RUNNER_MAP["macos,x64"]="macos-13"           # Intel
          RUNNER_MAP["macos,arm64"]="macos-14"         # Apple Silicon

          IFS=',' read -r -a PLATFORMS <<< "${{ inputs.platforms }}"
          IFS=',' read -r -a ARCHS <<< "${{ inputs.architectures }}"

          MATRIX_ENTRIES=()
          for platform in "${PLATFORMS[@]}"; do
            platform=$(echo "$platform" | xargs)
            if [[ -z "${SUPPORTED[$platform]}" ]]; then
              echo "Unsupported platform: $platform"
              exit 1
            fi
            for arch in "${ARCHS[@]}"; do
              arch=$(echo "$arch" | xargs)
              if [[ " ${SUPPORTED[$platform]} " =~ " $arch " ]]; then
                runner="${RUNNER_MAP["$platform,$arch"]}"
                if [[ -z "$runner" ]]; then
                  echo "No runner defined for $platform-$arch, skipping"
                  continue
                fi
                MATRIX_ENTRIES+=("{\"platform\":\"$platform\",\"arch\":\"$arch\",\"runner\":\"$runner\"}")
              else
                echo "Warning: $arch is not supported on $platform, skipping"
              fi
            done
          done

          if [ ${#MATRIX_ENTRIES[@]} -eq 0 ]; then
            echo "No valid (platform, arch) pairs selected."
            exit 1
          fi

          matrix_json=$(printf '%s\n' "${MATRIX_ENTRIES[@]}" | jq -c -s '.')
          echo "matrix=$matrix_json" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: master
          path: source

      # ---------- 通用：显示目录结构，便于调试 ----------
      - name: Show directory structure
        run: |
          echo "Current directory: $(pwd)"
          ls -la source/
          echo "--- source/FreeFileSync (if exists) ---"
          ls -la source/FreeFileSync || true
          echo "--- source/zen (if exists) ---"
          ls -la source/zen || true

      # ---------- Linux 专用步骤 ----------
      - name: Setup Linux dependencies
        if: startsWith(matrix.platform, 'linux')
        run: |
          sudo apt update
          # 基础编译工具
          sudo apt install -y g++ make pkg-config autoconf automake libtool gettext wget
          # 通用库
          sudo apt install -y libboost-all-dev libcurl4-openssl-dev libssh2-1-dev libidn2-dev libgtk-3-dev
        shell: bash

      - name: Prepare Linux multiarch for x86/arm builds
        if: matrix.platform == 'linux' && matrix.arch == 'x86'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y g++-multilib libboost-all-dev:i386 libcurl4-openssl-dev:i386 libssh2-1-dev:i386 libidn2-dev:i386 libgtk-3-dev:i386
        shell: bash

      - name: Prepare Linux armhf for armv7 builds
        if: matrix.platform == 'linux' && matrix.arch == 'arm'
        run: |
          sudo dpkg --add-architecture armhf
          sudo apt update
          sudo apt install -y crossbuild-essential-armhf libboost-all-dev:armhf libcurl4-openssl-dev:armhf libssh2-1-dev:armhf libidn2-dev:armhf libgtk-3-dev:armhf
        shell: bash

      - name: Build wxWidgets 3.1.2 (Linux)
        if: matrix.platform == 'linux'
        run: |
          wget https://github.com/wxWidgets/wxWidgets/releases/download/v${{ env.WX_VERSION }}/wxWidgets-${{ env.WX_VERSION }}.tar.bz2
          tar xf wxWidgets-${{ env.WX_VERSION }}.tar.bz2
          cd wxWidgets-${{ env.WX_VERSION }}
          mkdir gtk-build && cd gtk-build
          # 根据架构设置不同配置
          CONFIG_FLAGS="--disable-shared --enable-unicode --prefix=/usr/local"
          if [[ "${{ matrix.arch }}" == "x86" ]]; then
            CONFIG_FLAGS="$CONFIG_FLAGS --host=i686-linux-gnu CFLAGS=-m32 CXXFLAGS=-m32 LDFLAGS=-m32"
          elif [[ "${{ matrix.arch }}" == "arm" ]]; then
            CONFIG_FLAGS="$CONFIG_FLAGS --host=arm-linux-gnueabihf"
          elif [[ "${{ matrix.arch }}" == "arm64" ]]; then
            CONFIG_FLAGS="$CONFIG_FLAGS --host=aarch64-linux-gnu"
          fi
          ../configure $CONFIG_FLAGS
          make -j$(nproc)
          sudo make install
          sudo ldconfig
        shell: bash

      # ---------- Windows 专用步骤 (MSYS2) ----------
      - name: Setup MSYS2 (Windows)
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.arch == 'x64' && 'MINGW64' || 'MINGW32' }}
          update: true
          install: >-
            mingw-w64-${{ matrix.arch == 'x64' && 'x86_64' || 'i686' }}-gcc
            mingw-w64-${{ matrix.arch == 'x64' && 'x86_64' || 'i686' }}-make
            mingw-w64-${{ matrix.arch == 'x64' && 'x86_64' || 'i686' }}-boost
            mingw-w64-${{ matrix.arch == 'x64' && 'x86_64' || 'i686' }}-curl
            mingw-w64-${{ matrix.arch == 'x64' && 'x86_64' || 'i686' }}-libssh2
            mingw-w64-${{ matrix.arch == 'x64' && 'x86_64' || 'i686' }}-gtk3
            mingw-w64-${{ matrix.arch == 'x64' && 'x86_64' || 'i686' }}-pkg-config
            mingw-w64-${{ matrix.arch == 'x64' && 'x86_64' || 'i686' }}-openssl
            mingw-w64-${{ matrix.arch == 'x64' && 'x86_64' || 'i686' }}-autotools
            wget tar patch

      - name: Build wxWidgets 3.1.2 (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          cd $HOME
          wget https://github.com/wxWidgets/wxWidgets/releases/download/v${{ env.WX_VERSION }}/wxWidgets-${{ env.WX_VERSION }}.tar.bz2
          tar xf wxWidgets-${{ env.WX_VERSION }}.tar.bz2
          cd wxWidgets-${{ env.WX_VERSION }}
          mkdir -p build-msw
          cd build-msw
          ../configure --disable-shared --enable-unicode --prefix=$MINGW_PREFIX \
            --with-msw --with-libpng=builtin --with-libjpeg=builtin --with-libtiff=builtin \
            --with-expat=builtin --with-zlib=builtin --disable-dependency-tracking
          make -j$(nproc)
          make install

      # ---------- macOS 专用步骤 (Homebrew) ----------
      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew update
          brew install boost curl libssh2 wxwidgets
        shell: bash

      # ---------- 统一修复：zen 目录路径 ----------
      - name: Fix zen include path
        working-directory: source
        run: |
          echo "Searching for zen directory..."
          # 常见位置：源代码根目录下的 zen/ 或 FreeFileSync/zen/
          if [ -d "zen" ]; then
            ZEN_PATH="$(pwd)/zen"
          elif [ -d "FreeFileSync/zen" ]; then
            ZEN_PATH="$(pwd)/FreeFileSync/zen"
          else
            echo "ERROR: zen directory not found!"
            exit 1
          fi
          echo "zen found at: $ZEN_PATH"
          # 修正 Makefile：确保 CXXFLAGS 包含 -I$ZEN_PATH
          MAKEFILE="FreeFileSync/Source/Makefile"
          if [ -f "$MAKEFILE" ]; then
            sed -i "s|^\(CXXFLAGS[[:space:]]*+=\)|\1 -I$ZEN_PATH|" "$MAKEFILE"
          else
            echo "Makefile not found at $MAKEFILE, creating symlink as fallback"
            ln -sf "$ZEN_PATH" FreeFileSync/Source/zen
          fi
        shell: bash

      # ---------- 应用代码修改（解决编译错误）----------
      - name: Apply code tweaks (for older libcurl/libssh2)
        working-directory: source/FreeFileSync/Source
        run: |
          # 根据 README 中的修改，但版本 14.8 可能需要不同的调整
          # 这里保留原修改作为示例，您可能需要根据实际编译错误调整
          if [ -f "afs/libcurl/curl_wrap.h" ]; then
            sed -i '/CURLE_OBSOLETE51/d; /CURLE_RECURSIVE_API_CALL/d' afs/libcurl/curl_wrap.h
          fi
          if [ -f "afs/sftp.cpp" ]; then
            grep -q "MAX_SFTP_OUTGOING_SIZE" afs/sftp.cpp || \
              sed -i '58i#define MAX_SFTP_OUTGOING_SIZE 30000\n#define MAX_SFTP_READ_SIZE 30000' afs/sftp.cpp
            grep -q "LIBSSH2_SFTP_DEFAULT_MODE" afs/sftp.cpp || \
              sed -i '1662i#define LIBSSH2_SFTP_DEFAULT_MODE -1' afs/sftp.cpp
          fi
        shell: bash

      # ---------- 编译 ----------
      - name: Build FreeFileSync
        working-directory: source/FreeFileSync/Source
        env:
          # 根据不同平台架构设置额外环境变量
          CXXFLAGS: ${{ matrix.platform == 'linux' && matrix.arch == 'x86' && '-m32' || '' }}
          LDFLAGS: ${{ matrix.platform == 'linux' && matrix.arch == 'x86' && '-m32' || '' }}
        run: |
          make -j$(nproc)
        shell: ${{ matrix.platform == 'windows' && 'msys2 {0}' || 'bash' }}

      # ---------- 收集产物 ----------
      - name: Gather artifacts
        run: |
          mkdir -p artifacts
          if [ -f "source/FreeFileSync/Build/Bin/FreeFileSync" ]; then
            cp source/FreeFileSync/Build/Bin/FreeFileSync artifacts/FreeFileSync_${{ matrix.platform }}_${{ matrix.arch }}
          elif [ -f "source/FreeFileSync/Build/Bin/FreeFileSync.exe" ]; then
            cp source/FreeFileSync/Build/Bin/FreeFileSync.exe artifacts/FreeFileSync_${{ matrix.platform }}_${{ matrix.arch }}.exe
          else
            echo "Binary not found!"
            exit 1
          fi
        shell: bash

      # ---------- 简单测试 ----------
      - name: Test binary (version)
        run: |
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            # Windows 下使用 wine 或直接运行（需要 PowerShell）
            echo "Windows test skipped in this example (use wine if needed)"
          else
            chmod +x artifacts/FreeFileSync_${{ matrix.platform }}_${{ matrix.arch }}
            artifacts/FreeFileSync_${{ matrix.platform }}_${{ matrix.arch }} --version || echo "Binary executed but exit code ignored"
          fi
        shell: bash
        continue-on-error: true

      # ---------- 上传产物 ----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/
