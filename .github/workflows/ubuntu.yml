name: Build FreeFileSync

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target platforms (comma separated: linux)'
        required: true
        default: 'linux'
        type: string
      architectures:
        description: 'Target architectures (comma separated: x64, x86, arm, arm64)'
        required: true
        default: 'x64,x86,arm,arm64'
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: generate
        run: |
          declare -A SUPPORTED=(
            [linux]="x64 x86 arm arm64"
          )

          IFS=',' read -r -a PLATFORMS <<< "${{ inputs.platforms }}"
          IFS=',' read -r -a ARCHS <<< "${{ inputs.architectures }}"

          MATRIX_ENTRIES=()
          for platform in "${PLATFORMS[@]}"; do
            platform=$(echo "$platform" | xargs)
            if [[ -z "${SUPPORTED[$platform]}" ]]; then
              echo "Unsupported platform: $platform"
              exit 1
            fi
            for arch in "${ARCHS[@]}"; do
              arch=$(echo "$arch" | xargs)
              if [[ " ${SUPPORTED[$platform]} " =~ " $arch " ]]; then
                MATRIX_ENTRIES+=("{\"platform\":\"$platform\",\"arch\":\"$arch\"}")
              else
                echo "Warning: $arch is not supported on $platform, skipping"
              fi
            done
          done

          if [ ${#MATRIX_ENTRIES[@]} -eq 0 ]; then
            echo "No valid (platform, arch) pairs selected."
            exit 1
          fi

          matrix_json=$(printf '%s\n' "${MATRIX_ENTRIES[@]}" | jq -c -s '.')
          echo "matrix=$matrix_json" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout source code (master branch)
        uses: actions/checkout@v4
        with:
          repository: Geeeeeker/FreeFileSync
          ref: master
          path: FreeFileSync

      # ========== 原生构建：x64 ==========
      - name: Build for x64 (native)
        if: matrix.arch == 'x64'
        run: |
          # 安装基础工具
          sudo apt update
          sudo apt install -y g++ make pkg-config autoconf automake libtool gettext wget

          # 安装依赖
          sudo apt install -y \
            libboost-all-dev \
            libcurl4-openssl-dev \
            libssh2-1-dev \
            libidn2-dev \
            libgtk-3-dev \
            libssl-dev

          # 编译 wxWidgets
          wget https://github.com/wxWidgets/wxWidgets/releases/download/v3.1.2/wxWidgets-3.1.2.tar.bz2
          tar xf wxWidgets-3.1.2.tar.bz2
          cd wxWidgets-3.1.2
          mkdir gtk-build && cd gtk-build
          ../configure --disable-shared --enable-unicode --prefix=/usr/local --with-gtk=3
          make -j$(nproc)
          sudo make install
          sudo ldconfig
          cd ../..

          # 修复 zen 头文件路径
          cd FreeFileSync/FreeFileSync/Source
          ZEN_PATH=$(find $GITHUB_WORKSPACE/FreeFileSync -type d -name zen | head -1)
          if [ -n "$ZEN_PATH" ]; then
            echo "zen directory found at: $ZEN_PATH"
            sed -i "s|^\(CXXFLAGS[[:space:]]*+=\)|\1 -I$ZEN_PATH|" Makefile
            ln -sf "$ZEN_PATH" zen
          else
            echo "ERROR: zen directory not found"
            exit 1
          fi

          # 构建 FreeFileSync
          export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig
          make -j$(nproc) CXX=g++
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync $GITHUB_WORKSPACE/artifacts/FreeFileSync_linux_x64

      # ========== 原生构建：x86 ==========
      - name: Build for x86 (native, multilib)
        if: matrix.arch == 'x86'
        run: |
          # 安装基础工具
          sudo apt update
          sudo apt install -y g++ make pkg-config autoconf automake libtool gettext wget

          # 添加 i386 架构并安装依赖
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y \
            g++-multilib \
            libboost-all-dev:i386 \
            libcurl4-openssl-dev:i386 \
            libssh2-1-dev:i386 \
            libidn2-dev:i386 \
            libgtk-3-dev:i386 \
            libssl-dev:i386

          # 编译 wxWidgets (x86)
          wget https://github.com/wxWidgets/wxWidgets/releases/download/v3.1.2/wxWidgets-3.1.2.tar.bz2
          tar xf wxWidgets-3.1.2.tar.bz2
          cd wxWidgets-3.1.2
          mkdir gtk-build && cd gtk-build
          ../configure --disable-shared --enable-unicode --prefix=/usr/local/i686-linux-gnu \
            --host=i686-linux-gnu --build=x86_64-linux-gnu --with-gtk=3 \
            CFLAGS="-m32" CXXFLAGS="-m32" LDFLAGS="-m32"
          make -j$(nproc)
          sudo make install
          cd ../..

          # 修复 zen 头文件路径
          cd FreeFileSync/FreeFileSync/Source
          ZEN_PATH=$(find $GITHUB_WORKSPACE/FreeFileSync -type d -name zen | head -1)
          if [ -n "$ZEN_PATH" ]; then
            echo "zen directory found at: $ZEN_PATH"
            sed -i "s|^\(CXXFLAGS[[:space:]]*+=\)|\1 -I$ZEN_PATH|" Makefile
            ln -sf "$ZEN_PATH" zen
          else
            echo "ERROR: zen directory not found"
            exit 1
          fi

          # 构建 FreeFileSync (x86)
          export PATH=/usr/local/i686-linux-gnu/bin:$PATH
          export PKG_CONFIG_PATH=/usr/local/i686-linux-gnu/lib/pkgconfig:/usr/lib/i386-linux-gnu/pkgconfig
          make -j$(nproc) CXX=g++ CXXFLAGS="-m32" LDFLAGS="-m32"
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync $GITHUB_WORKSPACE/artifacts/FreeFileSync_linux_x86

      # ========== Docker+QEMU 构建：armhf ==========
      - name: Set up QEMU
        if: matrix.arch == 'arm' || matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Build for armhf (Docker container)
        if: matrix.arch == 'arm'
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v $PWD:/workspace -w /workspace \
            arm32v7/ubuntu:22.04 \
            bash -c "
              set -e
              apt update
              apt install -y g++ make pkg-config wget \
                libboost-filesystem-dev libboost-system-dev libboost-thread-dev \
                libcurl4-openssl-dev libssh2-1-dev libidn2-dev libgtk-3-dev libssl-dev

              # 编译 wxWidgets
              wget https://github.com/wxWidgets/wxWidgets/releases/download/v3.1.2/wxWidgets-3.1.2.tar.bz2
              tar xf wxWidgets-3.1.2.tar.bz2
              cd wxWidgets-3.1.2
              mkdir gtk-build && cd gtk-build
              ../configure --disable-shared --enable-unicode --prefix=/usr/local --with-gtk=3
              make -j$(nproc)
              make install
              ldconfig
              cd ../..

              # 修复 zen 头文件路径
              cd FreeFileSync/FreeFileSync/Source
              ZEN_PATH=\$(find /workspace/FreeFileSync -type d -name zen | head -1)
              if [ -n \"\$ZEN_PATH\" ]; then
                echo \"zen directory found at: \$ZEN_PATH\"
                sed -i \"s|^\\(CXXFLAGS[[:space:]]*+=\\)|\\1 -I\$ZEN_PATH|\" Makefile
                ln -sf \$ZEN_PATH zen
              else
                echo \"ERROR: zen directory not found\"
                exit 1
              fi

              # 构建 FreeFileSync
              make -j$(nproc) CXX=g++
              mkdir -p /workspace/artifacts
              cp ../Build/Bin/FreeFileSync /workspace/artifacts/FreeFileSync_linux_armhf
            "

      - name: Build for arm64 (Docker container)
        if: matrix.arch == 'arm64'
        run: |
          docker run --rm --platform linux/arm64 \
            -v $PWD:/workspace -w /workspace \
            arm64v8/ubuntu:22.04 \
            bash -c "
              set -e
              apt update
              apt install -y g++ make pkg-config wget \
                libboost-filesystem-dev libboost-system-dev libboost-thread-dev \
                libcurl4-openssl-dev libssh2-1-dev libidn2-dev libgtk-3-dev libssl-dev

              # 编译 wxWidgets
              wget https://github.com/wxWidgets/wxWidgets/releases/download/v3.1.2/wxWidgets-3.1.2.tar.bz2
              tar xf wxWidgets-3.1.2.tar.bz2
              cd wxWidgets-3.1.2
              mkdir gtk-build && cd gtk-build
              ../configure --disable-shared --enable-unicode --prefix=/usr/local --with-gtk=3
              make -j$(nproc)
              make install
              ldconfig
              cd ../..

              # 修复 zen 头文件路径
              cd FreeFileSync/FreeFileSync/Source
              ZEN_PATH=\$(find /workspace/FreeFileSync -type d -name zen | head -1)
              if [ -n \"\$ZEN_PATH\" ]; then
                echo \"zen directory found at: \$ZEN_PATH\"
                sed -i \"s|^\\(CXXFLAGS[[:space:]]*+=\\)|\\1 -I\$ZEN_PATH|\" Makefile
                ln -sf \$ZEN_PATH zen
              else
                echo \"ERROR: zen directory not found\"
                exit 1
              fi

              # 构建 FreeFileSync
              make -j$(nproc) CXX=g++
              mkdir -p /workspace/artifacts
              cp ../Build/Bin/FreeFileSync /workspace/artifacts/FreeFileSync_linux_arm64
            "

      # ========== 上传构建产物 ==========
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-linux-${{ matrix.arch }}
          path: artifacts/
