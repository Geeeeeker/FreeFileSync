name: Build FreeFileSync (Multi-arch) and Release

on:
  workflow_dispatch:  # 手动触发，无需输入参数

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, i386, arm64, arm]
        include:
          - arch: amd64
            platform: linux/amd64
            image: ubuntu:22.04
            binary_suffix: amd64
          - arch: i386
            platform: linux/386
            image: i386/ubuntu:20.04   # Ubuntu 20.04 仍提供 i386 镜像
            binary_suffix: i386
          - arch: arm64
            platform: linux/arm64
            image: arm64v8/ubuntu:22.04
            binary_suffix: aarch64
          - arch: arm
            platform: linux/arm/v7
            image: arm32v7/ubuntu:22.04
            binary_suffix: armhf

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM builds
        if: matrix.arch == 'arm64' || matrix.arch == 'arm'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Build in container
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ matrix.image }} \
            bash -c "
            set -e
            # 安装编译工具和依赖
            apt update && apt install -y \
              wget unzip bzip2 make g++ pkg-config \
              libgtk-3-dev libssl-dev libpsl-dev libidn2-dev patch

            # 编译 libssh2
            wget https://libssh2.org/download/libssh2-1.11.1.tar.gz
            tar xzf libssh2-1.11.1.tar.gz
            cd libssh2-1.11.1
            mkdir build && cd build
            ../configure
            make -j\$(nproc)
            make install
            cp /usr/local/lib/libssh2.so.1.0.1 /usr/lib/\$(gcc -dumpmachine)/ 2>/dev/null || true
            ldconfig
            cd ../..

            # 编译 libcurl
            wget https://curl.se/download/curl-8.15.0.tar.gz
            tar xzf curl-8.15.0.tar.gz
            cd curl-8.15.0
            mkdir build && cd build
            ../configure --with-openssl --with-libssh2 --enable-versioned-symbols
            make -j\$(nproc)
            make install
            cp /usr/local/lib/libcurl.so.4.8.0 /usr/lib/\$(gcc -dumpmachine)/ 2>/dev/null || true
            ldconfig
            cd ../..

            # 编译 wxWidgets
            wget https://github.com/wxWidgets/wxWidgets/releases/download/v3.3.1/wxWidgets-3.3.1.tar.bz2
            tar xjf wxWidgets-3.3.1.tar.bz2
            cd wxWidgets-3.3.1
            mkdir gtk-build && cd gtk-build
            ../configure --disable-shared
            make -j\$(nproc)
            make install
            cd ../..

            # 下载 FreeFileSync 源码
            wget https://freefilesync.org/download/FreeFileSync_14.4_Source.zip
            unzip FreeFileSync_14.4_Source.zip

            # 应用补丁（参照原文档）
            cd FreeFileSync/Source

            # 4.1 sftp.cpp
            sed -i '21i#define MAX_SFTP_OUTGOING_SIZE 30000\n#define MAX_SFTP_READ_SIZE 30000' afs/sftp.cpp

            # 4.2 Makefile (GTK2 → GTK3)
            sed -i 's/`pkg-config --cflags gtk+-2.0`/`pkg-config --cflags gtk+-3.0`/' Makefile
            sed -i 's/-isystem\/usr\/include\/gtk-2.0/-isystem\/usr\/include\/gtk-3.0/' Makefile

            # 4.3 application.cpp (#error → #warning)
            sed -i '243s/#error/#warning/' application.cpp

            # 4.4 darkmode.cpp
            sed -i '63s/globalDefaultThemeIsDark = wxSystemSettings::GetAppearance().AreAppsDark();/globalDefaultThemeIsDark = false;/' ../wx+/darkmode.cpp
            sed -i '96,99d' ../wx+/darkmode.cpp

            # 4.5 darkmode.h
            sed -i '12i#include <wx/settings.h>' ../wx+/darkmode.h
            sed -i '29r /dev/stdin' ../wx+/darkmode.h << 'EOF'
            struct wxColorHook
            {
                virtual ~wxColorHook() {}
                virtual wxColour getColor(wxSystemColour index) const = 0;
            };
            WXDLLIMPEXP_CORE inline std::unique_ptr<wxColorHook>& refGlobalColorHook()
            {
                static std::unique_ptr<wxColorHook> globalColorHook;
                return globalColorHook;
            }

            class WXDLLIMPEXP_CORE wxSystemSettings2 : public wxSystemSettingsNative
            {
            public:
                static wxColour GetColour(wxSystemColour index)
                {
                   if (refGlobalColorHook())
                                    return refGlobalColorHook()->getColor(index);

                   return wxSystemSettingsNative::GetColour(index);
                }
            };
            EOF

            # 4.6 gdrive.cpp (可选，留空)

            # 编译
            make -j\$(nproc)

            # 复制二进制到固定位置并重命名
            cd ../../Build/Bin
            BIN_NAME=\"FreeFileSync_${{ matrix.binary_suffix }}\"
            # 找到生成的可执行文件（通常以 FreeFileSync_ 开头）
            cp FreeFileSync_* \$BIN_NAME
            chmod +x \$BIN_NAME
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync_${{ matrix.arch }}
          path: ${{ github.workspace }}/FreeFileSync/Build/Bin/FreeFileSync_${{ matrix.binary_suffix }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version
        id: version
        run: |
          FFS_VERSION="14.4"
          DATE_TAG=$(date +'%Y%m%d')
          echo "VERSION=${FFS_VERSION}-${DATE_TAG}" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=FreeFileSync ${FFS_VERSION} (${DATE_TAG})" >> $GITHUB_OUTPUT

      - name: Prepare multi-arch archive
        run: |
          mkdir -p release
          # 将所有二进制复制到 release 目录
          find artifacts -type f -name "FreeFileSync_*" -exec cp {} release/ \;
          cd release
          zip -9 ../FreeFileSync_${{ steps.version.outputs.VERSION }}_multiarch.zip ./*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.RELEASE_NAME }}
          draft: false
          prerelease: false
          files: FreeFileSync_${{ steps.version.outputs.VERSION }}_multiarch.zip
          generate_release_notes: true
