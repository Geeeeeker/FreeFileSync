name: Build and Release FreeFileSync

on:
  workflow_dispatch:  # 手动触发，无需输入

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64, arm, i386]
        include:
          - arch: amd64
            platform: linux/amd64
            binary_suffix: amd64
          - arch: arm64
            platform: linux/arm64
            binary_suffix: aarch64
          - arch: arm
            platform: linux/arm/v7
            binary_suffix: armhf
          - arch: i386
            platform: linux/386
            binary_suffix: i386

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 启用多架构仿真（实际使用 QEMU，但这是 Docker 官方支持）
      - name: Set up Docker multi-architecture environment
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Build inside container
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ubuntu:24.04 \
            bash -c "
            set -e
            # 安装编译工具和依赖
            apt update && apt install -y \
              wget unzip bzip2 make g++ pkg-config \
              libgtk-3-dev libssl-dev libpsl-dev libidn2-dev patch

            # 编译 libssh2
            wget https://libssh2.org/download/libssh2-1.11.1.tar.gz
            tar xzf libssh2-1.11.1.tar.gz
            cd libssh2-1.11.1
            mkdir build && cd build
            ../configure
            make -j\$(nproc)
            make install
            cp /usr/local/lib/libssh2.so.1.0.1 /usr/lib/\$(gcc -dumpmachine)/ 2>/dev/null || true
            ldconfig
            cd ../..

            # 编译 libcurl
            wget https://curl.se/download/curl-8.15.0.tar.gz
            tar xzf curl-8.15.0.tar.gz
            cd curl-8.15.0
            mkdir build && cd build
            ../configure --with-openssl --with-libssh2 --enable-versioned-symbols
            make -j\$(nproc)
            make install
            cp /usr/local/lib/libcurl.so.4.8.0 /usr/lib/\$(gcc -dumpmachine)/ 2>/dev/null || true
            ldconfig
            cd ../..

            # 编译 wxWidgets
            wget https://github.com/wxWidgets/wxWidgets/releases/download/v3.3.1/wxWidgets-3.3.1.tar.bz2
            tar xjf wxWidgets-3.3.1.tar.bz2
            cd wxWidgets-3.3.1
            mkdir gtk-build && cd gtk-build
            ../configure --disable-shared
            make -j\$(nproc)
            make install
            cd ../..

            # 下载 FreeFileSync 源码
            wget https://freefilesync.org/download/FreeFileSync_14.4_Source.zip
            unzip FreeFileSync_14.4_Source.zip

            # 应用补丁 (参照原文档)
            cd FreeFileSync/Source

            # 4.1 sftp.cpp
            sed -i '21i#define MAX_SFTP_OUTGOING_SIZE 30000\n#define MAX_SFTP_READ_SIZE 30000' afs/sftp.cpp

            # 4.2 Makefile (GTK2 → GTK3)
            sed -i 's/`pkg-config --cflags gtk+-2.0`/`pkg-config --cflags gtk+-3.0`/' Makefile
            sed -i 's/-isystem\/usr\/include\/gtk-2.0/-isystem\/usr\/include\/gtk-3.0/' Makefile

            # 4.3 application.cpp (#error → #warning)
            sed -i '243s/#error/#warning/' application.cpp

            # 4.4 darkmode.cpp
            sed -i '63s/globalDefaultThemeIsDark = wxSystemSettings::GetAppearance().AreAppsDark();/globalDefaultThemeIsDark = false;/' ../wx+/darkmode.cpp
            sed -i '96,99d' ../wx+/darkmode.cpp

            # 4.5 darkmode.h
            sed -i '12i#include <wx/settings.h>' ../wx+/darkmode.h
            sed -i '29r /dev/stdin' ../wx+/darkmode.h << 'EOF'
            struct wxColorHook
            {
                virtual ~wxColorHook() {}
                virtual wxColour getColor(wxSystemColour index) const = 0;
            };
            WXDLLIMPEXP_CORE inline std::unique_ptr<wxColorHook>& refGlobalColorHook()
            {
                static std::unique_ptr<wxColorHook> globalColorHook;
                return globalColorHook;
            }

            class WXDLLIMPEXP_CORE wxSystemSettings2 : public wxSystemSettingsNative
            {
            public:
                static wxColour GetColour(wxSystemColour index)
                {
                   if (refGlobalColorHook())
                                    return refGlobalColorHook()->getColor(index);

                   return wxSystemSettingsNative::GetColour(index);
                }
            };
            EOF

            # 4.6 gdrive.cpp (可选，留空)

            # 编译
            make -j\$(nproc)

            # 复制并重命名二进制文件
            cd ../../Build/Bin
            BIN_NAME=\"FreeFileSync_${{ matrix.binary_suffix }}\"
            if [ -f FreeFileSync_aarch64 ]; then
                cp FreeFileSync_aarch64 \$BIN_NAME
            elif [ -f FreeFileSync_armhf ]; then
                cp FreeFileSync_armhf \$BIN_NAME
            elif [ -f FreeFileSync_i386 ]; then
                cp FreeFileSync_i386 \$BIN_NAME
            elif [ -f FreeFileSync_amd64 ]; then
                cp FreeFileSync_amd64 \$BIN_NAME
            else
                cp FreeFileSync* \$BIN_NAME
            fi
            chmod +x \$BIN_NAME
            "

      - name: Upload artifact (per arch)
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync_${{ matrix.arch }}
          path: ${{ github.workspace }}/FreeFileSync/Build/Bin/FreeFileSync_${{ matrix.binary_suffix }}
          if-no-files-found: error

  release:
    name: Create Release and Package All Binaries
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate version tag
        id: version
        run: |
          # 使用日期和短提交哈希作为版本号
          DATE=$(date +'%Y%m%d')
          HASH=$(git rev-parse --short HEAD)
          echo "tag=v${DATE}-${HASH}" >> $GITHUB_OUTPUT

      - name: Prepare release archive
        run: |
          mkdir -p release_files
          cp artifacts/FreeFileSync_amd64/FreeFileSync_amd64 release_files/
          cp artifacts/FreeFileSync_arm64/FreeFileSync_aarch64 release_files/
          cp artifacts/FreeFileSync_arm/FreeFileSync_armhf release_files/
          cp artifacts/FreeFileSync_i386/FreeFileSync_i386 release_files/
          cd release_files
          zip -9 ../FreeFileSync_${{ steps.version.outputs.tag }}_multiarch.zip ./*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FreeFileSync ${{ steps.version.outputs.tag }}
          body: |
            Automated build of FreeFileSync 14.4 for multiple architectures.

            **Included binaries:**
            - `FreeFileSync_amd64`   → x86_64
            - `FreeFileSync_aarch64` → ARM64
            - `FreeFileSync_armhf`   → ARMv7 (32-bit)
            - `FreeFileSync_i386`    → x86 (32-bit)

            These binaries are statically linked (wxWidgets built with `--disable-shared`) and should run on most Linux distributions without additional dependencies.
          draft: false
          prerelease: false
          files: FreeFileSync_${{ steps.version.outputs.tag }}_multiarch.zip
