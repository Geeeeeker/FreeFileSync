name: Build FreeFileSync

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target platforms (comma separated: linux, windows, macos)'
        required: true
        default: 'linux,windows,macos'
        type: string
      architectures:
        description: 'Target architectures (comma separated: x86, x64, arm, arm64)'
        required: true
        default: 'x64,arm64'
        type: string

jobs:
  # 生成构建矩阵（平台+架构有效组合）
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: generate
        run: |
          # 定义每个平台支持的架构
          declare -A SUPPORTED=(
            [linux]="x86 x64 arm arm64"
            [windows]="x86 x64 arm arm64"
            [macos]="x64 arm64"
          )

          IFS=',' read -r -a PLATFORMS <<< "${{ inputs.platforms }}"
          IFS=',' read -r -a ARCHS <<< "${{ inputs.architectures }}"

          MATRIX_ENTRIES=()
          for platform in "${PLATFORMS[@]}"; do
            platform=$(echo "$platform" | xargs)
            if [[ -z "${SUPPORTED[$platform]}" ]]; then
              echo "Unsupported platform: $platform"
              exit 1
            fi
            for arch in "${ARCHS[@]}"; do
              arch=$(echo "$arch" | xargs)
              if [[ " ${SUPPORTED[$platform]} " =~ " $arch " ]]; then
                MATRIX_ENTRIES+=("{\"platform\":\"$platform\",\"arch\":\"$arch\"}")
              else
                echo "Warning: $arch is not supported on $platform, skipping"
              fi
            done
          done

          if [ ${#MATRIX_ENTRIES[@]} -eq 0 ]; then
            echo "No valid (platform, arch) pairs selected."
            exit 1
          fi

          # 输出紧凑 JSON 数组（修复格式错误）
          matrix_json=$(printf '%s\n' "${MATRIX_ENTRIES[@]}" | jq -c -s '.')
          echo "matrix=$matrix_json" >> $GITHUB_OUTPUT

  # 并行构建每个组合
  build:
    needs: setup
    runs-on: ${{ matrix.platform == 'windows' && 'windows-latest' || matrix.platform == 'macos' && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout source code (master branch)
        uses: actions/checkout@v4
        with:
          repository: Geeeeeker/FreeFileSync
          ref: master
          path: FreeFileSync

      # ---------- 安装依赖 ----------
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt update
          sudo apt install -y g++ make libboost-all-dev
          # 交叉编译工具链
          if [[ "${{ matrix.arch }}" == "arm" ]]; then
            sudo apt install -y g++-arm-linux-gnueabihf
          fi
          if [[ "${{ matrix.arch }}" == "arm64" ]]; then
            sudo apt install -y g++-aarch64-linux-gnu
          fi
          if [[ "${{ matrix.arch }}" == "x86" ]]; then
            sudo apt install -y g++-multilib
          fi

      - name: Install Windows dependencies (MSYS2)
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64   # 默认，后续会根据架构覆盖
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-wxWidgets
            # 对于 arm64 还需要 clang（下面步骤中单独安装）

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew update
          brew install boost wxwidgets

      # ---------- Windows 构建（按架构分别处理）----------
      - name: Build FreeFileSync for Windows (x64)
        if: matrix.platform == 'windows' && matrix.arch == 'x64'
        shell: msys2 {0}
        run: |
          export MSYSTEM=MINGW64
          cd FreeFileSync/FreeFileSync/Source
          sed -i 's/\bg++\b/g++/g' Makefile
          make -j$(nproc)
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync.exe $GITHUB_WORKSPACE/artifacts/FreeFileSync_windows_x64.exe

      - name: Build FreeFileSync for Windows (x86)
        if: matrix.platform == 'windows' && matrix.arch == 'x86'
        shell: msys2 {0}
        run: |
          export MSYSTEM=MINGW32
          cd FreeFileSync/FreeFileSync/Source
          sed -i 's/\bg++\b/g++/g' Makefile
          make -j$(nproc)
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync.exe $GITHUB_WORKSPACE/artifacts/FreeFileSync_windows_x86.exe

      - name: Build FreeFileSync for Windows (arm64)
        if: matrix.platform == 'windows' && matrix.arch == 'arm64'
        shell: msys2 {0}
        run: |
          # 安装 arm64 工具链（若未预装）
          pacman -S --noconfirm mingw-w64-clang-aarch64-clang
          export MSYSTEM=CLANGARM64
          cd FreeFileSync/FreeFileSync/Source
          sed -i 's/\bg++\b/clang++/g' Makefile
          make -j$(nproc)
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync.exe $GITHUB_WORKSPACE/artifacts/FreeFileSync_windows_arm64.exe

      # Windows 的 arm（32位）架构类似处理，但需确认工具链可用

      # ---------- Linux 构建 ----------
      - name: Build FreeFileSync for Linux
        if: matrix.platform == 'linux'
        working-directory: FreeFileSync/FreeFileSync/Source
        run: |
          case "${{ matrix.arch }}" in
            x86)
              export CXX="g++ -m32"
              export AR=gcc-ar
              ;;
            x64)
              export CXX="g++ -m64"
              export AR=gcc-ar
              ;;
            arm)
              export CXX=arm-linux-gnueabihf-g++
              export AR=arm-linux-gnueabihf-ar
              ;;
            arm64)
              export CXX=aarch64-linux-gnu-g++
              export AR=aarch64-linux-gnu-ar
              ;;
          esac
          sed -i "s/\bg++\b/${CXX}/g" Makefile
          make -j$(nproc)
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync $GITHUB_WORKSPACE/artifacts/FreeFileSync_linux_${{ matrix.arch }}

      # ---------- macOS 构建 ----------
      - name: Build FreeFileSync for macOS
        if: matrix.platform == 'macos'
        working-directory: FreeFileSync/FreeFileSync/Source
        run: |
          case "${{ matrix.arch }}" in
            x64)
              export ARCH_FLAGS="-arch x86_64"
              ;;
            arm64)
              export ARCH_FLAGS="-arch arm64"
              ;;
          esac
          export CXX=clang++
          export CXXFLAGS="$ARCH_FLAGS"
          sed -i "s/\bg++\b/${CXX}/g" Makefile
          make -j$(sysctl -n hw.logicalcpu)
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync $GITHUB_WORKSPACE/artifacts/FreeFileSync_macos_${{ matrix.arch }}

      # ---------- 上传构建产物 ----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/
