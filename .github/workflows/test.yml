name: Build FreeFileSync (Native/Cross Compile)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: true
        default: 'amd64'
        type: choice
        options:
          - amd64
          - arm64
          - armhf
          - i386

jobs:
  build-amd64:
    if: github.event.inputs.arch == 'amd64'
    runs-on: ubuntu-latest
    env:
      TARGET_TRIPLE: x86_64-linux-gnu
      CROSS: false
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget unzip bzip2 make g++ pkg-config \
            libgtk-3-dev libssl-dev libpsl-dev libidn2-dev patch git
      - name: Build libssh2
        run: .github/scripts/build-libssh2.sh
      - name: Build libcurl
        run: .github/scripts/build-libcurl.sh
      - name: Build wxWidgets
        run: .github/scripts/build-wxwidgets.sh
      - name: Clone and patch FreeFileSync
        run: .github/scripts/patch-ffs.sh
      - name: Build FreeFileSync
        run: .github/scripts/build-ffs.sh
      - name: Package binary
        run: .github/scripts/package.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync_amd64
          path: FreeFileSync_amd64.zip
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}-amd64
          name: FreeFileSync amd64 (build #${{ github.run_number }})
          body: |
            **Architecture**: amd64
            **Commit**: ${{ github.sha }}
            **Run ID**: ${{ github.run_id }}
          draft: false
          prerelease: true
          files: FreeFileSync_amd64.zip

  build-arm64:
    if: github.event.inputs.arch == 'arm64'
    runs-on: ubuntu-24.04-arm   # GitHub 官方 ARM64 运行器
    env:
      TARGET_TRIPLE: aarch64-linux-gnu
      CROSS: false
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget unzip bzip2 make g++ pkg-config \
            libgtk-3-dev libssl-dev libpsl-dev libidn2-dev patch git
      - name: Build libssh2
        run: .github/scripts/build-libssh2.sh
      - name: Build libcurl
        run: .github/scripts/build-libcurl.sh
      - name: Build wxWidgets
        run: .github/scripts/build-wxwidgets.sh
      - name: Clone and patch FreeFileSync
        run: .github/scripts/patch-ffs.sh
      - name: Build FreeFileSync
        run: .github/scripts/build-ffs.sh
      - name: Package binary
        run: .github/scripts/package.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync_arm64
          path: FreeFileSync_arm64.zip
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}-arm64
          name: FreeFileSync arm64 (build #${{ github.run_number }})
          body: |
            **Architecture**: arm64
            **Commit**: ${{ github.sha }}
            **Run ID**: ${{ github.run_id }}
          draft: false
          prerelease: true
          files: FreeFileSync_arm64.zip

  build-armhf:
    if: github.event.inputs.arch == 'armhf'
    runs-on: ubuntu-latest
    env:
      TARGET_TRIPLE: arm-linux-gnueabihf
      CROSS: true
      CC: arm-linux-gnueabihf-gcc
      CXX: arm-linux-gnueabihf-g++
      PKG_CONFIG_PATH: /usr/lib/arm-linux-gnueabihf/pkgconfig
    steps:
      - uses: actions/checkout@v4
      - name: Install cross-compilation dependencies
        run: |
          sudo apt update
          sudo apt install -y wget unzip bzip2 make pkg-config patch git \
            g++-arm-linux-gnueabihf
          sudo dpkg --add-architecture armhf
          sudo apt update
          sudo apt install -y libgtk-3-dev:armhf libssl-dev:armhf libpsl-dev:armhf libidn2-dev:armhf
      - name: Build libssh2
        run: .github/scripts/build-libssh2.sh
      - name: Build libcurl
        run: .github/scripts/build-libcurl.sh
      - name: Build wxWidgets
        run: .github/scripts/build-wxwidgets.sh
      - name: Clone and patch FreeFileSync
        run: .github/scripts/patch-ffs.sh
      - name: Build FreeFileSync
        run: .github/scripts/build-ffs.sh
      - name: Package binary
        run: .github/scripts/package.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync_armhf
          path: FreeFileSync_armhf.zip
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}-armhf
          name: FreeFileSync armhf (build #${{ github.run_number }})
          body: |
            **Architecture**: armhf
            **Commit**: ${{ github.sha }}
            **Run ID**: ${{ github.run_id }}
          draft: false
          prerelease: true
          files: FreeFileSync_armhf.zip

  build-i386:
    if: github.event.inputs.arch == 'i386'
    runs-on: ubuntu-latest
    env:
      TARGET_TRIPLE: i686-linux-gnu
      CROSS: true
      CC: gcc -m32
      CXX: g++ -m32
      PKG_CONFIG_PATH: /usr/lib/i386-linux-gnu/pkgconfig
    steps:
      - uses: actions/checkout@v4
      - name: Install cross-compilation dependencies
        run: |
          sudo apt update
          sudo apt install -y wget unzip bzip2 make pkg-config patch git \
            g++-multilib
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y libgtk-3-dev:i386 libssl-dev:i386 libpsl-dev:i386 libidn2-dev:i386
      - name: Build libssh2
        run: .github/scripts/build-libssh2.sh
      - name: Build libcurl
        run: .github/scripts/build-libcurl.sh
      - name: Build wxWidgets
        run: .github/scripts/build-wxwidgets.sh
      - name: Clone and patch FreeFileSync
        run: .github/scripts/patch-ffs.sh
      - name: Build FreeFileSync
        run: .github/scripts/build-ffs.sh
      - name: Package binary
        run: .github/scripts/package.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync_i386
          path: FreeFileSync_i386.zip
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}-i386
          name: FreeFileSync i386 (build #${{ github.run_number }})
          body: |
            **Architecture**: i386
            **Commit**: ${{ github.sha }}
            **Run ID**: ${{ github.run_id }}
          draft: false
          prerelease: true
          files: FreeFileSync_i386.zip
