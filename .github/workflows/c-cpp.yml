              cp "$found" FreeFileSync/Build/
              rm -rf fallback.zip fallback
          fi

      - name: Install Homebrew dependencies
        run: |
          brew update
          brew install boost wxwidgets libssh2 curl

      - name: Configure Makefile for arm64
        run: |
          cd FreeFileSync/Source
          sed -i '' 's/^CXX = g++/CXX = clang++ -arch arm64/' Makefile
          echo "LDFLAGS += -framework CoreFoundation -framework Security" >> Makefile

      - name: Build FreeFileSync
        run: |
          cd FreeFileSync/Source
          make -j$(sysctl -n hw.ncpu)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-macos-arm64
          path: FreeFileSync/Build/Bin/

  ###########################################################################
  # Windows x86
  ###########################################################################
  windows-x86:
    if: github.event.inputs.target == 'windows-x86'
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Resources.zip exists
        shell: pwsh
        run: |
          $resourcesPath = "FreeFileSync/Build/Resources.zip"
          if (-not (Test-Path $resourcesPath)) {
              Write-Host "Resources.zip missing, attempting to download from version $env:RESOURCES_FALLBACK_VERSION"
              $fallbackUrl = "https://freefilesync.org/download/FreeFileSync_$env:RESOURCES_FALLBACK_VERSION`_Source.zip"
              $fallbackZip = "fallback.zip"
              
              Write-Host "Downloading from $fallbackUrl"
              curl.exe -L -f -o $fallbackZip $fallbackUrl
              if ($LASTEXITCODE -ne 0) {
                  Write-Error "Failed to download fallback source from $fallbackUrl"
                  exit 1
              }
              
              if ((Get-Item $fallbackZip).Length -lt 1MB) {
                  Write-Error "Downloaded file is too small, likely invalid"
                  exit 1
              }
              
              $tempDir = "fallback_temp"
              Expand-Archive -Path $fallbackZip -DestinationPath $tempDir -Force
              
              $foundResource = Get-ChildItem -Path $tempDir -Recurse -Filter "Resources.zip" | Select-Object -First 1
              if (-not $foundResource) {
                  Write-Error "Could not find Resources.zip in the extracted files"
                  exit 1
              }
              
              New-Item -ItemType Directory -Force -Path (Split-Path $resourcesPath -Parent) | Out-Null
              Copy-Item -Path $foundResource.FullName -Destination $resourcesPath -Force
              Write-Host "Resources.zip successfully placed at $resourcesPath"
              
              Remove-Item -Path $fallbackZip -Force
              Remove-Item -Path $tempDir -Recurse -Force
          }

      - name: Install vcpkg and dependencies (x86)
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg install boost wxwidgets libssh2 curl --triplet x86-windows-static

      - name: Set up Visual Studio environment
        uses: microsoft/setup-msbuild@v2

      - name: Build FreeFileSync (x86)
        run: |
          cd FreeFileSync/Source
          $vcpkgPath = "$pwd\..\..\vcpkg\scripts\buildsystems\vcpkg.cmake"
          msbuild FreeFileSync.sln /p:Configuration=Release /p:Platform=Win32 `
            /p:VcpkgTriplet=x86-windows-static /p:VcpkgEnabled=true /p:VcpkgRoot="$pwd\..\..\vcpkg\installed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-windows-x86
          path: FreeFileSync/Build/Bin/

