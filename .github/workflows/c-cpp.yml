name: Build FreeFileSync

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Select target platform and architecture'
        required: true
        type: choice
        options:
          - linux-x86_64
          - linux-aarch64
          - macos-x86_64
          - macos-arm64
          - windows-x86
          - windows-x64
          - windows-arm64

env:
  FFS_VERSION: 14.8
  RESOURCES_FALLBACK_VERSION: 14.7

jobs:
  ###########################################################################
  # Linux x86_64
  ###########################################################################
  linux-x86_64:
    if: github.event.inputs.target == 'linux-x86_64'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Resources.zip exists
        run: |
          if [ ! -f FreeFileSync/Build/Resources.zip ]; then
              echo "Resources.zip missing, downloading from version $RESOURCES_FALLBACK_VERSION"
              curl -fL -o fallback.zip "https://freefilesync.org/download/FreeFileSync_${RESOURCES_FALLBACK_VERSION}_Source.zip"
              # 检查文件大小（至少 1MB）
              size=$(wc -c < fallback.zip)
              if [ $size -lt 1000000 ]; then
                  echo "Downloaded file is too small, likely invalid"
                  exit 1
              fi
              unzip -q fallback.zip -d fallback
              found=$(find fallback -name "Resources.zip" -print -quit)
              if [ -z "$found" ]; then
                  echo "Could not find Resources.zip in the extracted files"
                  exit 1
              fi
              mkdir -p FreeFileSync/Build
              cp "$found" FreeFileSync/Build/
              rm -rf fallback.zip fallback
          fi

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y g++-11 make libboost-all-dev libssl-dev libssh2-1-dev libcurl4-openssl-dev
          sudo snap install cmake --classic

      - name: Cache wxWidgets
        id: cache-wx
        uses: actions/cache@v4
        with:
          path: ~/wx-install
          key: linux-x86_64-wxWidgets-3.1.5

      - name: Build and install wxWidgets (static)
        if: steps.cache-wx.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/wxWidgets/wxWidgets/releases/download/v3.1.5/wxWidgets-3.1.5.tar.bz2
          tar -xf wxWidgets-3.1.5.tar.bz2
          cd wxWidgets-3.1.5
          mkdir gtk-build && cd gtk-build
          ../configure --disable-shared --enable-unicode --prefix=$HOME/wx-install
          make -j$(nproc)
          make install

      - name: Configure Makefile
        run: |
          cd FreeFileSync/Source
          sed -i 's/^CXX = g++/CXX = g++-11/' Makefile
          echo "LDFLAGS += -static-libstdc++ -static-libgcc" >> Makefile

      - name: Build FreeFileSync
        run: |
          cd FreeFileSync/Source
          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-linux-x86_64
          path: FreeFileSync/Build/Bin/

  ###########################################################################
  # Linux aarch64
  ###########################################################################
  linux-aarch64:
    if: github.event.inputs.target == 'linux-aarch64'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Resources.zip exists
        run: |
          if [ ! -f FreeFileSync/Build/Resources.zip ]; then
              echo "Resources.zip missing, downloading from version $RESOURCES_FALLBACK_VERSION"
              curl -fL -o fallback.zip "https://freefilesync.org/download/FreeFileSync_${RESOURCES_FALLBACK_VERSION}_Source.zip"
              size=$(wc -c < fallback.zip)
              if [ $size -lt 1000000 ]; then
                  echo "Downloaded file is too small, likely invalid"
                  exit 1
              fi
              unzip -q fallback.zip -d fallback
              found=$(find fallback -name "Resources.zip" -print -quit)
              if [ -z "$found" ]; then
                  echo "Could not find Resources.zip in the extracted files"
                  exit 1
              fi
              mkdir -p FreeFileSync/Build
              cp "$found" FreeFileSync/Build/
              rm -rf fallback.zip fallback
          fi

      - name: Install cross-compilation dependencies
        run: |
          sudo apt update
          sudo apt install -y g++-11-aarch64-linux-gnu gcc-11-aarch64-linux-gnu make \
            libboost-all-dev libssl-dev:arm64 libssh2-1-dev:arm64 libcurl4-openssl-dev:arm64
          sudo dpkg --add-architecture arm64
          sudo apt update
          sudo apt install -y libc6-dev:arm64 libstdc++-11-dev:arm64

      - name: Cache wxWidgets (aarch64)
        id: cache-wx
        uses: actions/cache@v4
        with:
          path: ~/wx-install-aarch64
          key: linux-aarch64-wxWidgets-3.1.5

      - name: Build and install wxWidgets (aarch64 static)
        if: steps.cache-wx.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/wxWidgets/wxWidgets/releases/download/v3.1.5/wxWidgets-3.1.5.tar.bz2
          tar -xf wxWidgets-3.1.5.tar.bz2
          cd wxWidgets-3.1.5
          mkdir gtk-build && cd gtk-build
          export CC=aarch64-linux-gnu-gcc-11
          export CXX=aarch64-linux-gnu-g++-11
          export AR=aarch64-linux-gnu-ar
          export RANLIB=aarch64-linux-gnu-ranlib
          ../configure --host=aarch64-linux-gnu --disable-shared --enable-unicode --prefix=$HOME/wx-install-aarch64
          make -j$(nproc)
          make install

      - name: Configure Makefile for aarch64
        run: |
          cd FreeFileSync/Source
          sed -i 's/^CXX = g++/CXX = aarch64-linux-gnu-g++-11/' Makefile
          echo "LDFLAGS += -static-libstdc++ -static-libgcc" >> Makefile

      - name: Build FreeFileSync
        run: |
          cd FreeFileSync/Source
          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-linux-aarch64
          path: FreeFileSync/Build/Bin/

  ###########################################################################
  # macOS x86_64
  ###########################################################################
  macos-x86_64:
    if: github.event.inputs.target == 'macos-x86_64'
    runs-on: macos-13
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Resources.zip exists
        run: |
          if [ ! -f FreeFileSync/Build/Resources.zip ]; then
              echo "Resources.zip missing, downloading from version $RESOURCES_FALLBACK_VERSION"
              curl -fL -o fallback.zip "https://freefilesync.org/download/FreeFileSync_${RESOURCES_FALLBACK_VERSION}_Source.zip"
              size=$(wc -c < fallback.zip)
              if [ $size -lt 1000000 ]; then
                  echo "Downloaded file is too small, likely invalid"
                  exit 1
              fi
              unzip -q fallback.zip -d fallback
              found=$(find fallback -name "Resources.zip" -print -quit)
              if [ -z "$found" ]; then
                  echo "Could not find Resources.zip in the extracted files"
                  exit 1
              fi
              mkdir -p FreeFileSync/Build
              cp "$found" FreeFileSync/Build/
              rm -rf fallback.zip fallback
          fi

      - name: Install Homebrew dependencies
        run: |
          brew update
          brew install boost wxwidgets libssh2 curl

      - name: Configure Makefile for x86_64
        run: |
          cd FreeFileSync/Source
          sed -i '' 's/^CXX = g++/CXX = clang++ -arch x86_64/' Makefile
          echo "LDFLAGS += -framework CoreFoundation -framework Security" >> Makefile

      - name: Build FreeFileSync
        run: |
          cd FreeFileSync/Source
          make -j$(sysctl -n hw.ncpu)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-macos-x86_64
          path: FreeFileSync/Build/Bin/

  ###########################################################################
  # macOS arm64
  ###########################################################################
  macos-arm64:
    if: github.event.inputs.target == 'macos-arm64'
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Resources.zip exists
        run: |
          if [ ! -f FreeFileSync/Build/Resources.zip ]; then
              echo "Resources.zip missing, downloading from version $RESOURCES_FALLBACK_VERSION"
              curl -fL -o fallback.zip "https://freefilesync.org/download/FreeFileSync_${RESOURCES_FALLBACK_VERSION}_Source.zip"
              size=$(wc -c < fallback.zip)
