name: Build FreeFileSync (Selectable Target)

on:
  workflow_dispatch:
    inputs:
      target:
        description: '选择要构建的平台和架构'
        required: true
        type: choice
        options:
          - linux-x86_64
          - linux-aarch64
          - macos-x86_64
          - macos-arm64
          - windows-x86
          - windows-x64
          - windows-arm64

env:
  FFS_VERSION: 14.7
  SOURCE_ZIP_PATH: FreeFileSync/FreeFileSync_14.7_Source.zip

jobs:
  ###########################################################################
  # Linux 构建
  ###########################################################################
  build-linux:
    runs-on: ubuntu-22.04
    if: startsWith(github.event.inputs.target, 'linux-')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract source code
        run: |
          if [ ! -f "$SOURCE_ZIP_PATH" ]; then
            echo "Error: Source zip not found at $SOURCE_ZIP_PATH"
            exit 1
          fi
          echo "Found source zip, extracting..."
          unzip -q "$SOURCE_ZIP_PATH" -d ffs-source-tmp
          echo "Contents of temporary directory:"
          ls -la ffs-source-tmp
          # 如果临时目录下只有一个子目录，将其重命名为 ffs-source
          if [ $(ls -1 ffs-source-tmp | wc -l) -eq 1 ] && [ -d "ffs-source-tmp/$(ls ffs-source-tmp)" ]; then
            mv "ffs-source-tmp/$(ls ffs-source-tmp)" ffs-source
          else
            # 否则将所有内容移动到 ffs-source
            mkdir -p ffs-source
            mv ffs-source-tmp/* ffs-source/ 2>/dev/null || true
          fi
          rm -rf ffs-source-tmp
          echo "Final source structure:"
          ls -la ffs-source

      - name: Extract architecture from target
        id: arch
        run: |
          ARCH="${{ github.event.inputs.target }}"
          echo "arch=${ARCH#linux-}" >> $GITHUB_OUTPUT

      - name: Install native dependencies (x86_64)
        if: steps.arch.outputs.arch == 'x86_64'
        run: |
          sudo apt update
          sudo apt install -y g++-11 make libboost-all-dev libssl-dev libssh2-1-dev libcurl4-openssl-dev
          sudo snap install cmake --classic

      - name: Install cross-compilation dependencies (aarch64)
        if: steps.arch.outputs.arch == 'aarch64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt update
          sudo apt install -y g++-11-aarch64-linux-gnu gcc-11-aarch64-linux-gnu make \
            libboost-all-dev libssl-dev:arm64 libssh2-1-dev:arm64 libcurl4-openssl-dev:arm64 \
            libc6-dev:arm64 libstdc++-11-dev:arm64

      - name: Cache wxWidgets build
        id: cache-wx
        uses: actions/cache@v4
        with:
          path: ~/wx-install
          key: ${{ runner.os }}-${{ steps.arch.outputs.arch }}-wxWidgets-3.1.5

      - name: Build and install wxWidgets (static)
        if: steps.cache-wx.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/wxWidgets/wxWidgets/releases/download/v3.1.5/wxWidgets-3.1.5.tar.bz2
          tar -xf wxWidgets-3.1.5.tar.bz2
          cd wxWidgets-3.1.5
          mkdir gtk-build && cd gtk-build
          if [ "${{ steps.arch.outputs.arch }}" = "aarch64" ]; then
            export CC=aarch64-linux-gnu-gcc-11
            export CXX=aarch64-linux-gnu-g++-11
            export AR=aarch64-linux-gnu-ar
            export RANLIB=aarch64-linux-gnu-ranlib
            HOST_FLAG="--host=aarch64-linux-gnu"
          fi
          ../configure $HOST_FLAG --disable-shared --enable-unicode --prefix=$HOME/wx-install
          make -j$(nproc)
          make install

      - name: Apply code patches (if needed)
        run: |
          cd ffs-source/FreeFileSync/Source
          # 如果 14.7 仍有编译错误，可在此添加补丁命令
          echo "No patches required for this version (check if needed)"

      - name: Configure Makefile for architecture
        run: |
          cd ffs-source/FreeFileSync/Source
          if [ "${{ steps.arch.outputs.arch }}" = "aarch64" ]; then
            sed -i 's/^CXX = g++/CXX = aarch64-linux-gnu-g++-11/' Makefile
          else
            sed -i 's/^CXX = g++/CXX = g++-11/' Makefile
          fi
          echo "LDFLAGS += -static-libstdc++ -static-libgcc" >> Makefile
          echo "CXXFLAGS += -I$HOME/wx-install/include" >> Makefile
          echo "LDFLAGS += -L$HOME/wx-install/lib" >> Makefile

      - name: Build FreeFileSync
        run: |
          cd ffs-source/FreeFileSync/Source
          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-Linux-${{ steps.arch.outputs.arch }}
          path: ffs-source/FreeFileSync/Build/Bin/

  ###########################################################################
  # macOS 构建
  ###########################################################################
  build-macos:
    runs-on: ${{ (contains(github.event.inputs.target, 'arm64') && 'macos-14') || 'macos-13' }}
    if: startsWith(github.event.inputs.target, 'macos-')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract source code
        run: |
          if [ ! -f "$SOURCE_ZIP_PATH" ]; then
            echo "Error: Source zip not found at $SOURCE_ZIP_PATH"
            exit 1
          fi
          echo "Found source zip, extracting..."
          unzip -q "$SOURCE_ZIP_PATH" -d ffs-source-tmp
          echo "Contents of temporary directory:"
          ls -la ffs-source-tmp
          if [ $(ls -1 ffs-source-tmp | wc -l) -eq 1 ] && [ -d "ffs-source-tmp/$(ls ffs-source-tmp)" ]; then
            mv "ffs-source-tmp/$(ls ffs-source-tmp)" ffs-source
          else
            mkdir -p ffs-source
            mv ffs-source-tmp/* ffs-source/ 2>/dev/null || true
          fi
          rm -rf ffs-source-tmp
          echo "Final source structure:"
          ls -la ffs-source

      - name: Extract architecture from target
        id: arch
        run: |
          ARCH="${{ github.event.inputs.target }}"
          echo "arch=${ARCH#macos-}" >> $GITHUB_OUTPUT

      - name: Install Homebrew dependencies
        run: |
          brew update
          brew install boost wxwidgets libssh2 curl

      - name: Apply code patches (if needed)
        run: |
          cd ffs-source/FreeFileSync/Source
          echo "No patches required for macOS (check if needed)"

      - name: Configure Makefile for architecture
        run: |
          cd ffs-source/FreeFileSync/Source
          if [ "${{ steps.arch.outputs.arch }}" = "arm64" ]; then
            sed -i '' 's/^CXX = g++/CXX = clang++ -arch arm64/' Makefile
          else
            sed -i '' 's/^CXX = g++/CXX = clang++ -arch x86_64/' Makefile
          fi
          echo "LDFLAGS += -framework CoreFoundation -framework Security" >> Makefile

      - name: Build FreeFileSync
        run: |
          cd ffs-source/FreeFileSync/Source
          make -j$(sysctl -n hw.ncpu)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-macOS-${{ steps.arch.outputs.arch }}
          path: ffs-source/FreeFileSync/Build/Bin/

  ###########################################################################
  # Windows 构建
  ###########################################################################
  build-windows:
    runs-on: windows-2022
    if: startsWith(github.event.inputs.target, 'windows-')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract source code
        shell: pwsh
        run: |
          $zipPath = "$env:SOURCE_ZIP_PATH"
          if (-not (Test-Path $zipPath)) {
            Write-Error "Source zip not found at $zipPath"
            exit 1
          }
          Write-Host "Found source zip, extracting..."
          Expand-Archive -Path $zipPath -DestinationPath ffs-source-tmp -Force
          Write-Host "Contents of temporary directory:"
          Get-ChildItem ffs-source-tmp
          $items = Get-ChildItem ffs-source-tmp
          if ($items.Count -eq 1 -and $items[0].PSIsContainer) {
            # 只有一个子目录，将其重命名为 ffs-source
            Rename-Item -Path $items[0].FullName -NewName "ffs-source"
          } else {
            # 否则，创建 ffs-source 并将所有内容移入
            New-Item -ItemType Directory -Path ffs-source -Force
            Move-Item -Path ffs-source-tmp\* -Destination ffs-source\ -Force
          }
          Remove-Item -Recurse -Force ffs-source-tmp
          Write-Host "Final source structure:"
          Get-ChildItem ffs-source

      - name: Extract architecture from target
        id: arch
        shell: pwsh
        run: |
          $target = "${{ github.event.inputs.target }}"
          $arch = $target -replace '^windows-', ''
          echo "arch=$arch" >> $env:GITHUB_OUTPUT

      - name: Install vcpkg and dependencies
        shell: pwsh
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          $triplet = @{
            "x86" = "x86-windows-static"
            "x64" = "x64-windows-static"
            "arm64" = "arm64-windows-static"
          }["${{ steps.arch.outputs.arch }}"]
          .\vcpkg\vcpkg install boost wxwidgets libssh2 curl --triplet $triplet
          echo "VCPKG_ROOT=$pwd\vcpkg" >> $env:GITHUB_ENV

      - name: Set up Visual Studio environment
        uses: microsoft/setup-msbuild@v2

      - name: Build FreeFileSync (using solution file)
        shell: pwsh
        run: |
          cd ffs-source\FreeFileSync\Source
          $platform = @{
            "x86" = "Win32"
            "x64" = "x64"
            "arm64" = "ARM64"
          }["${{ steps.arch.outputs.arch }}"]
          $vcpkgTriplet = @{
            "x86" = "x86-windows-static"
            "x64" = "x64-windows-static"
            "arm64" = "arm64-windows-static"
          }["${{ steps.arch.outputs.arch }}"]
          msbuild FreeFileSync.sln /p:Configuration=Release /p:Platform=$platform `
            /p:VcpkgTriplet=$vcpkgTriplet /p:VcpkgEnabled=true /p:VcpkgRoot="$env:VCPKG_ROOT\installed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-Windows-${{ steps.arch.outputs.arch }}
          path: ffs-source\FreeFileSync\Build\Bin\
