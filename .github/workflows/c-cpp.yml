name: Build FreeFileSync

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target platforms (comma separated: linux, windows, macos)'
        required: true
        default: 'linux,windows,macos'
        type: string
      architectures:
        description: 'Target architectures (comma separated: x86, x64, arm, arm64)'
        required: true
        default: 'x86,x64,arm,arm64'
        type: string

jobs:
  # 前置 job：解析输入，生成有效的构建矩阵（平台 + 架构组合）
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: generate
        run: |
          # 定义每个平台支持的架构
          declare -A SUPPORTED=(
            [linux]="x86 x64 arm arm64"
            [windows]="x86 x64 arm arm64"
            [macos]="x64 arm64"
          )

          # 将输入的逗号分隔字符串转换为数组
          IFS=',' read -r -a PLATFORMS <<< "${{ inputs.platforms }}"
          IFS=',' read -r -a ARCHS <<< "${{ inputs.architectures }}"

          MATRIX_ENTRIES=()
          for platform in "${PLATFORMS[@]}"; do
            platform=$(echo "$platform" | xargs) # 去除空格
            if [[ -z "${SUPPORTED[$platform]}" ]]; then
              echo "Unsupported platform: $platform"
              exit 1
            fi
            for arch in "${ARCHS[@]}"; do
              arch=$(echo "$arch" | xargs)
              if [[ " ${SUPPORTED[$platform]} " =~ " $arch " ]]; then
                MATRIX_ENTRIES+=("{\"platform\":\"$platform\",\"arch\":\"$arch\"}")
              else
                echo "Warning: $arch is not supported on $platform, skipping"
              fi
            done
          done

          # 转换为 JSON 数组字符串
          if [ ${#MATRIX_ENTRIES[@]} -eq 0 ]; then
            echo "No valid (platform, arch) pairs selected."
            exit 1
          fi

          matrix_json=$(printf '%s\n' "${MATRIX_ENTRIES[@]}" | jq -s '.')
          echo "matrix=$matrix_json" >> $GITHUB_OUTPUT

  # 实际构建 job：根据矩阵并行构建每个组合
  build:
    needs: setup
    runs-on: ${{ matrix.platform == 'windows' && 'windows-latest' || matrix.platform == 'macos' && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false  # 一个组合失败不影响其他组合

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          repository: Geeeeeker/FreeFileSync
          ref: main  # 请根据实际分支或标签修改，例如 v14.8
          path: FreeFileSync

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt update
          sudo apt install -y g++ make libboost-all-dev

      - name: Install Windows dependencies (MSYS2)
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64  # 可根据架构选择 MINGW32/MINGW64/CLANGARM64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-wxWidgets

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew update
          brew install boost wxwidgets

      # 通用步骤：编译安装 wxWidgets（如果包管理器版本不满足要求，可取消注释并调整）
      # - name: Build wxWidgets from source
      #   if: matrix.platform == 'linux' || matrix.platform == 'macos'
      #   run: |
      #     wget https://github.com/wxWidgets/wxWidgets/releases/download/v3.1.2/wxWidgets-3.1.2.tar.bz2
      #     tar xf wxWidgets-3.1.2.tar.bz2
      #     cd wxWidgets-3.1.2
      #     mkdir gtk-build && cd gtk-build
      #     ../configure --disable-shared --enable-unicode
      #     make -j$(nproc)
      #     sudo make install

      # 为不同架构准备交叉编译工具链（仅 Linux）
      - name: Install cross-compilation tools (Linux)
        if: matrix.platform == 'linux' && (matrix.arch == 'arm' || matrix.arch == 'arm64')
        run: |
          sudo apt install -y \
            g++-arm-linux-gnueabihf \
            g++-aarch64-linux-gnu
          # 如需为 ARM 编译 wxWidgets，可在此处交叉编译并安装到 sysroot

      # 构建 Linux 版本
      - name: Build FreeFileSync for Linux
        if: matrix.platform == 'linux'
        working-directory: FreeFileSync/FreeFileSync/Source
        run: |
          # 根据架构选择编译器
          case "${{ matrix.arch }}" in
            x86)
              export CXX=g++ -m32
              export AR=gcc-ar
              ;;
            x64)
              export CXX=g++ -m64
              export AR=gcc-ar
              ;;
            arm)
              export CXX=arm-linux-gnueabihf-g++
              export AR=arm-linux-gnueabihf-ar
              ;;
            arm64)
              export CXX=aarch64-linux-gnu-g++
              export AR=aarch64-linux-gnu-ar
              ;;
          esac
          # 如果 Makefile 中硬编码了 g++，需要替换（类似原流程步骤4）
          sed -i "s/\bg++\b/${CXX}/g" Makefile
          make -j$(nproc)

          # 将生成的二进制移到方便上传的位置
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync $GITHUB_WORKSPACE/artifacts/FreeFileSync_linux_${{ matrix.arch }}

      # 构建 Windows 版本（使用 MSYS2 的 MinGW）
      - name: Build FreeFileSync for Windows
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        working-directory: FreeFileSync/FreeFileSync/Source
        run: |
          # 根据架构选择工具链
          case "${{ matrix.arch }}" in
            x86)
              export PATH=/mingw32/bin:$PATH
              export CXX=g++
              ;;
            x64)
              export PATH=/mingw64/bin:$PATH
              export CXX=g++
              ;;
            arm)
              export PATH=/clangarm64/bin:$PATH
              export CXX=clang++  # MSYS2 中 ARM64 使用 clang
              ;;
            arm64)
              export PATH=/clangarm64/bin:$PATH
              export CXX=clang++
              ;;
          esac
          # 修改 Makefile 中的编译器（如果使用 Makefile）
          sed -i "s/\bg++\b/${CXX}/g" Makefile
          make -j$(nproc)

          # 假设生成的 exe 在 ../Build/Bin/
          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync.exe $GITHUB_WORKSPACE/artifacts/FreeFileSync_windows_${{ matrix.arch }}.exe

      # 构建 macOS 版本
      - name: Build FreeFileSync for macOS
        if: matrix.platform == 'macos'
        working-directory: FreeFileSync/FreeFileSync/Source
        run: |
          # 根据架构设置编译标志（macOS 使用 clang，x86_64 和 arm64 可通用）
          case "${{ matrix.arch }}" in
            x64)
              export ARCH_FLAGS="-arch x86_64"
              ;;
            arm64)
              export ARCH_FLAGS="-arch arm64"
              ;;
          esac
          # 如果 Makefile 使用默认编译器，可能需要指定 CXX=clang++ 和相应标志
          export CXX=clang++
          export CXXFLAGS="$ARCH_FLAGS"
          sed -i "s/\bg++\b/${CXX}/g" Makefile
          make -j$(sysctl -n hw.logicalcpu)

          mkdir -p $GITHUB_WORKSPACE/artifacts/
          cp ../Build/Bin/FreeFileSync $GITHUB_WORKSPACE/artifacts/FreeFileSync_macos_${{ matrix.arch }}

      # 上传所有构建产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FreeFileSync-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/
